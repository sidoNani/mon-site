          style="position:absolute;right:8px;top:50%;transform:translateY(-50%);
                 width:38px;height:38px;border-radius:10px;
                 background:var(--red);border:none;cursor:pointer;
                 display:flex;align-items:center;justify-content:center;
                 transition:opacity .15s,transform .12s;font-size:17px;"
          title="Chercher">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px" id="dict-suggestions">
        ${["bonjour","merci","je t'aime","café","plage","voiture","maison","travailler"].map(w=>
          `<button class="dict-sugg" data-w="${w}" style="padding:5px 12px;border:1px solid var(--brd);border-radius:var(--r-pill);font-size:12px;font-weight:500;color:var(--muted);background:var(--surf);cursor:pointer;transition:all .15s">${w}</button>`
        ).join("")}
      </div>
    </div>
    <div id="dict-result-area"></div>
    <div id="dict-history-area"></div>
  `;

  const input=wrap.querySelector("#dict-q");
  const btn=wrap.querySelector("#dict-search-btn");
  const resultArea=wrap.querySelector("#dict-result-area");
  const histArea=wrap.querySelector("#dict-history-area");

  function renderHistory(){
    if(dictHistory.length===0){
      histArea.innerHTML=`
        <div class="dict-empty">
          <div class="dict-empty-icon">🇧🇷</div>
          <div class="dict-empty-title">Cherchez un mot</div>
          <div class="dict-empty-sub">Tapez n'importe quel mot ou expression en français pour obtenir sa traduction en portugais brésilien avec un exemple d'utilisation.</div>
        </div>`;
      return;
    }
    histArea.innerHTML=`<p class="lbl" style="margin-top:24px">Recherches récentes</p>`;
    dictHistory.forEach(item=>{
      const el=document.createElement("div");
      el.className="dict-hist-item";
      el.innerHTML=`<div><div class="dict-hist-pt">${item.pt}</div><div class="dict-hist-fr">${item.fr}</div></div><span style="color:var(--dim);font-size:12px">→</span>`;
      el.addEventListener("click",()=>{
        input.value=item.fr;
        const tagsHtml=(item.tags||[]).map(t=>`<span class="dict-tag">${t}</span>`).join("");
        const pseudoWord={pt:item.pt,ph:item.phonetic,fr:item.fr};
        const phonoHtml=`<div style="margin:6px 0 2px">${phonoLine(pseudoWord,"14px")}</div>`;
        resultArea.innerHTML=`
          <div class="dict-result">
            <div class="dict-result-header">
              <div class="dict-pt-word">${item.pt}</div>
              ${phonoHtml}
              <div class="dict-fr-word" style="margin-top:4px">🇫🇷 ${item.fr}</div>
            </div>
            <div class="dict-body">
              ${tagsHtml?`<div><div class="dict-section-lbl">Catégorie</div><div class="dict-tags">${tagsHtml}</div></div>`:""}
              <div>
                <div class="dict-section-lbl">Exemple en contexte</div>
                <div class="dict-example">${item.example_pt}</div>
                <div class="dict-example-trans">${item.example_fr}</div>
              </div>
            </div>
          </div>`;
        wrap.scrollTop=0;
        resultArea.scrollIntoView({behavior:"smooth",block:"start"});
      });
      histArea.appendChild(el);
    });
  }

  async function doSearch(){
    const q=input.value.trim();
    if(!q)return;
    btn.disabled=true;
    await dictLookup(q,resultArea);
    btn.disabled=false;
    renderHistory();
    resultArea.scrollIntoView({behavior:"smooth",block:"start"});
  }

  btn.addEventListener("click",doSearch);
  btn.addEventListener("mouseenter",()=>{btn.style.opacity=".85";btn.style.transform="translateY(-50%) scale(1.06)";});
  btn.addEventListener("mouseleave",()=>{btn.style.opacity="1";btn.style.transform="translateY(-50%) scale(1)";});
  input.addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});
  input.addEventListener("focus",()=>{input.style.borderColor="rgba(230,225,255,.3)";input.style.boxShadow="0 0 0 4px rgba(230,225,255,.05)";});

function renderAlpha(){
  const wrap=document.createElement("div");
  wrap.className="alpha-wrap";

  const tabs=["🔤 Voyelles","🔡 Consonnes","🔗 Combinaisons"];
  const tabEl=document.createElement("div");
  tabEl.className="alpha-tabs";
  tabs.forEach((label,i)=>{
    const btn=document.createElement("button");
    btn.className="alpha-tab"+(alphaTab===i?" active":"");
    btn.textContent=label;
    btn.addEventListener("click",()=>{alphaTab=i;refreshAlpha(wrap);});
    tabEl.appendChild(btn);
  });

  const header=document.createElement("div");
  header.innerHTML=`
    <h2 style="font-family:var(--fd);font-size:24px;font-weight:900;margin-bottom:6px">🗣️ Phonétique</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px">Les sons du portugais brésilien expliqués en français · Appuie pour écouter</p>`;

  wrap.appendChild(header);
  wrap.appendChild(tabEl);

  const content=document.createElement("div");
  content.id="alpha-content";
  wrap.appendChild(content);
  refreshAlpha(wrap);
  return wrap;
}

function refreshAlpha(wrap){
  const content=wrap.querySelector("#alpha-content");
  content.innerHTML="";

  // Update tab styles
  wrap.querySelectorAll(".alpha-tab").forEach((btn,i)=>{
    btn.className="alpha-tab"+(alphaTab===i?" active":"");
  });

  if(alphaTab===0) renderAlphaVowels(content);
  else if(alphaTab===1) renderAlphaConsonants(content);
  else renderAlphaCombos(content);
}

function renderAlphaVowels(container){
  const tip=document.createElement("div");
  tip.className="alpha-tip";
  tip.innerHTML=`<strong>💡 Règle d'or :</strong> En portugais brésilien, les voyelles en fin de mot se "réduisent" : le <strong>o</strong> final devient <strong>u</strong>, le <strong>e</strong> final devient <strong>i</strong>. Ex : <em>bolo</em> → "BO-lu", <em>ele</em> → "E-li"`;
  container.appendChild(tip);

  const title=document.createElement("div");
  title.className="alpha-section-title";
  title.innerHTML="Voyelles simples & nasales";
  container.appendChild(title);

  const grid=document.createElement("div");
  grid.className="alpha-grid";
  ALPHA_DATA.vowels.forEach(item=>grid.appendChild(makeAlphaCard(item)));
  container.appendChild(grid);
}

function renderAlphaConsonants(container){
  const tip=document.createElement("div");
  tip.className="alpha-tip";
  tip.innerHTML=`<strong>💡 Les pièges :</strong> Le <strong>R</strong> initial sonne comme un "H" espagnol, <strong>T</strong> et <strong>D</strong> se palatalisent devant "i" en "tch/dj". Le <strong>L</strong> final devient "u". Ce sont les 3 chocs principaux pour un francophone.`;
  container.appendChild(tip);

  const title=document.createElement("div");
  title.className="alpha-section-title";
  title.innerHTML="Consonnes & pièges";
  container.appendChild(title);

  const grid=document.createElement("div");
  grid.className="alpha-grid";
  ALPHA_DATA.consonants.forEach(item=>grid.appendChild(makeAlphaCard(item)));
  container.appendChild(grid);
}

function renderAlphaCombos(container){
  const tip=document.createElement("div");
  tip.className="alpha-tip";
  tip.innerHTML=`<strong>💡 Les digrammes :</strong> LH, NH et CH sont des sons propres au portugais. Les diphtongues OU, EI, AI, ÃO sont très fréquentes — apprends-les par cœur, elles reviennent partout.`;
  container.appendChild(tip);

  const title=document.createElement("div");
  title.className="alpha-section-title";
  title.innerHTML="Digrammes & diphtongues";
  container.appendChild(title);

  ALPHA_DATA.combos.forEach(item=>{
    const card=document.createElement("div");
    card.className="alpha-combo-card";
    card.style.borderLeft=`3px solid ${item.color}`;
    card.innerHTML=`
      <div class="alpha-combo-letters" style="color:${item.color}">${item.letters}</div>
      <div class="alpha-combo-body">
        <div class="alpha-combo-sound">Son : « ${item.sound} »</div>
        <div class="alpha-combo-fr">${item.fr}</div>
        <div class="alpha-combo-ex">${item.examples.map(e=>`${e.word} [${e.ipa}] = ${e.fr}`).join(" · ")}</div>
      </div>
      <div class="alpha-combo-btn">🔊</div>`;
    let playing=false;
    card.addEventListener("click",()=>{
      if(playing)return;
      playing=true;
      card.classList.add("playing");
      // Speak all example words in sequence
      const words=item.examples.map(e=>e.word);
      let i=0;
      function speakNext(){
        if(i>=words.length){card.classList.remove("playing");playing=false;return;}
        speak(words[i++]);
        setTimeout(speakNext,1200);
      }
      speakNext();
    });
    container.appendChild(card);
  });
}

function makeAlphaCard(item){
  const card=document.createElement("div");
  card.className="alpha-card";
  card.style.setProperty("--ac",item.color);
  card.innerHTML=`
    <button class="alpha-play" title="Écouter">🔊</button>
    <div class="alpha-letter" style="color:${item.color}">${item.letter}</div>
    <div class="alpha-sound">« ${item.sound} »</div>
    <div class="alpha-fr">${item.fr}</div>
    <div class="alpha-example">${item.examples.map(e=>`<em>${e.word}</em> [${e.ipa}] ${e.fr}`).join("<br>")}</div>`;

  let playing=false;
  const playBtn=card.querySelector(".alpha-play");
  function doPlay(e){
    e&&e.stopPropagation();
    if(playing)return;
    playing=true;
    card.classList.add("playing");
    playBtn.textContent="▶";
    const words=item.examples.map(ex=>ex.word);
    let i=0;
    function next(){
      if(i>=words.length){card.classList.remove("playing");playBtn.textContent="🔊";playing=false;return;}
      speak(words[i++]);
      setTimeout(next,1400);
    }
    next();
  }
  playBtn.addEventListener("click",doPlay);
  card.addEventListener("click",doPlay);
  return card;
}

6. Après ton message en portugais, ajoute obligatoirement sur une nouvelle ligne "🇫🇷 " suivi d'une traduction CONCISE en français (l'essentiel seulement).
7. Niveau de l'utilisateur : ${level}. ${level==="débutant"?"Utilise des phrases simples et répète les mots importants.":level==="intermédiaire"?"Tu peux utiliser du vocabulaire plus varié.":"Parle naturellement comme avec un Brésilien."}

FORMAT OBLIGATOIRE — respecte-le exactement :
[Ton message en portugais brésilien]
🇫🇷 [Traduction courte en français]

Ne mets rien d'autre. Pas de guillemets, pas de "Note:", juste le message et la traduction.`;
};

let chatMessages=[];
let chatScenario=CHAT_SCENARIOS[0];
let chatLevel="débutant";
let chatLoading=false;

function renderChat(){
  const wrap=document.createElement("div");
  wrap.className="chat-wrap au";
  wrap.style.cssText="display:flex;flex-direction:column;padding-top:14px;min-height:calc(100dvh - 120px);position:relative";
  renderChatUI(wrap);
  return wrap;
}

function renderChatUI(wrap){
  if(chatMessages.length===0){
    const intro=getScenarioIntro(chatScenario);
    chatMessages=[{role:"assistant",pt:intro.pt,fr:intro.fr}];
  }

  const scenarioHTML=CHAT_SCENARIOS.map(s=>`
    <div class="scenario-item${s.id===chatScenario.id?" selected":""}" data-sid="${s.id}">
      <div class="scenario-icon">${s.icon}</div>
      <div class="scenario-name">${s.name}</div>
      <div class="scenario-desc">${s.desc}</div>
    </div>`).join("");

  // Overlay behind sheet
  const overlay=document.createElement("div");
  overlay.className="scenario-overlay";
  overlay.id="scenario-overlay";
  document.body.appendChild(overlay);

  wrap.innerHTML=`
    <div class="chat-top">
      <div class="chat-avatar" style="font-size:22px">${chatScenario.icon}</div>
      <div class="chat-contact-info">
        <div class="chat-contact-name">${chatScenario.name}</div>
        <div class="chat-contact-status">En ligne · IA gratuite</div>
      </div>
      <button class="chat-scenario-btn" id="open-scenarios" style="display:flex;align-items:center;gap:5px;font-size:12px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Scénario
      </button>
    </div>

    <div class="chat-messages" id="chat-msgs"></div>

    <div style="flex-shrink:0">
      <div class="chat-input-bar">
        <input class="chat-input" id="chat-inp" placeholder="Écris un message…" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="chat-speak-btn" id="chat-speak-btn" title="Écouter le dernier message">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <button class="chat-send" id="chat-send-btn" title="Envoyer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div style="display:flex;gap:5px;padding:4px 0 6px;align-items:center">
        <span style="font-size:9px;color:var(--dim);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-family:var(--fm)">Niveau</span>
        ${["débutant","intermédiaire","avancé"].map(l=>`<button class="level-btn" data-lv="${l}"
          style="border:1px solid ${chatLevel===l?"var(--red)":"var(--brd)"};
                 background:${chatLevel===l?"rgba(255,41,82,.12)":"var(--surf)"};
                 border-radius:var(--r-pill);padding:4px 10px;font-size:11px;font-weight:600;
                 color:${chatLevel===l?"var(--red2)":"var(--muted)"};cursor:pointer;
                 transition:all .15s">${l}</button>`).join("")}
      </div>
    </div>

    <div class="scenario-sheet" id="scenario-sheet">
      <div class="scenario-handle"></div>
      <div class="scenario-title">Choisir un scénario</div>
      <div class="scenario-grid">${scenarioHTML}</div>
    </div>
  `;

  const msgsEl=wrap.querySelector("#chat-msgs");
  const inp=wrap.querySelector("#chat-inp");
  const sendBtn=wrap.querySelector("#chat-send-btn");
  const scenarioSheet=wrap.querySelector("#scenario-sheet");

  chatMessages.forEach(m=>appendMessage(msgsEl,m));
  msgsEl.scrollTop=msgsEl.scrollHeight;

  // Level buttons
  wrap.querySelectorAll(".level-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      chatLevel=btn.dataset.lv;
      wrap.querySelectorAll(".level-btn").forEach(b=>{
        b.style.borderColor=b.dataset.lv===chatLevel?"rgba(242,178,51,.5)":"var(--brd)";
        b.style.background=b.dataset.lv===chatLevel?"rgba(242,178,51,.12)":"rgba(255,252,245,.04)";
        b.style.color=b.dataset.lv===chatLevel?"var(--gold2)":"var(--muted)";
      });
    });
  });

  // Scenario sheet open/close
  const ov=document.getElementById("scenario-overlay");
  function openSheet(){scenarioSheet.classList.add("open");if(ov)ov.classList.add("visible");}
  function closeSheet(){scenarioSheet.classList.remove("open");if(ov)ov.classList.remove("visible");}

  wrap.querySelector("#open-scenarios").addEventListener("click",e=>{
    e.stopPropagation();
    scenarioSheet.classList.contains("open")?closeSheet():openSheet();
  });
  scenarioSheet.querySelectorAll(".scenario-item").forEach(item=>{
    item.addEventListener("click",()=>{
      chatScenario=CHAT_SCENARIOS.find(s=>s.id===item.dataset.sid);
      chatMessages=[];
      closeSheet();
      setTimeout(()=>{if(ov)ov.remove();wrap.innerHTML="";renderChatUI(wrap);},280);
    });
  });
  if(ov) ov.addEventListener("click",closeSheet);

  // Speak last AI message
  wrap.querySelector("#chat-speak-btn").addEventListener("click",()=>{
    const last=[...chatMessages].reverse().find(m=>m.role==="assistant");
    if(last&&last.pt) speak(last.pt);
  });

  async function sendMessage(){
    const text=inp.value.trim();
    if(!text||chatLoading)return;
    inp.value="";
    const userMsg={role:"user",text};
    chatMessages.push(userMsg);
    appendMessage(msgsEl,userMsg);
    msgsEl.scrollTop=msgsEl.scrollHeight;

    const typingEl=document.createElement("div");
    typingEl.className="msg msg-them";
    typingEl.innerHTML=`<div class="msg-typing"><span></span><span></span><span></span></div>`;
    msgsEl.appendChild(typingEl);
    msgsEl.scrollTop=msgsEl.scrollHeight;

    chatLoading=true;
    sendBtn.disabled=true;
    inp.disabled=true;

    try{
      // Build history for Pollinations (OpenAI-compatible, free, no key)
      const history=chatMessages
        .filter(m=>m.role==="user"||m.role==="assistant")
        .map(m=>({
          role:m.role,
          content:m.role==="user"?m.text:(m.pt+(m.fr?"\n🇫🇷 "+m.fr:""))
        }));

      const resp=await fetch("https://text.pollinations.ai/openai",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"openai",
          messages:[
            {role:"system",content:CHAT_SYSTEM_PROMPT(chatScenario,chatLevel)},
            ...history
          ],
          temperature:0.85,
          max_tokens:250,
          private:true
        })
      });

      if(!resp.ok){
        const errText=await resp.text().catch(()=>"");
        throw new Error(`Erreur ${resp.status}${errText?": "+errText.slice(0,80):""}`);
      }

      const data=await resp.json();
      const raw=data.choices?.[0]?.message?.content||"";

      let pt=raw.trim(),fr="";
      const frMatch=raw.match(/\n🇫🇷\s*(.+)$/s);
      if(frMatch){
        fr=frMatch[1].trim();
        pt=raw.replace(/\n🇫🇷.+$/s,"").trim();
      }

      const aiMsg={role:"assistant",pt,fr};
      chatMessages.push(aiMsg);
      typingEl.remove();
      appendMessage(msgsEl,aiMsg);
      msgsEl.scrollTop=msgsEl.scrollHeight;

    }catch(err){
      typingEl.remove();
      const errEl=document.createElement("div");
      errEl.className="chat-error";
      errEl.style.margin="0";
      let msg=err.message||"Erreur inconnue";
      if(msg.includes("Failed to fetch")||msg.includes("NetworkError")||msg.includes("Load failed")){
        msg="🌐 Pas de connexion internet. Le chat nécessite une connexion pour fonctionner.";
      }
      errEl.textContent=msg;
      msgsEl.appendChild(errEl);
      msgsEl.scrollTop=msgsEl.scrollHeight;
      chatMessages.pop();
    }finally{
      chatLoading=false;
      sendBtn.disabled=false;
      inp.disabled=false;
      inp.focus();
    }
  }

  sendBtn.addEventListener("click",sendMessage);
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}});
  setTimeout(()=>inp.focus(),100);
}

function appendMessage(container,msg){
  const el=document.createElement("div");
  const isMe=msg.role==="user";
  el.className=`msg ${isMe?"msg-me":"msg-them"}`;
  const now=new Date();
  const time=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
  if(isMe){
    el.innerHTML=`<div class="msg-bubble">${msg.text.replace(/</g,"&lt;")}</div><div class="msg-time">${time} ✓✓</div>`;
  } else {
    const ptEsc=(msg.pt||"").replace(/'/g,"\\'").replace(/</g,"&lt;");
    el.innerHTML=`
      <div class="msg-bubble" style="cursor:pointer" onclick="speak('${ptEsc}')">${(msg.pt||"").replace(/</g,"&lt;")}</div>
      ${msg.fr?`<div class="msg-translation"><span>🇫🇷</span> ${msg.fr.replace(/</g,"&lt;")}</div>`:""}
      <div class="msg-time">${time}</div>`;
  }
  container.appendChild(el);
}

async function doVideoSearch(q,container,btn){
  if(!q.trim())return;
  videoQuery=q.trim();
  btn.disabled=true;
  container.innerHTML=`<div class="videos-spinner">Recherche en cours…</div>`;

  // Bibliothèque curatée de vidéos pour apprendre le portugais brésilien
  const VIDEO_LIBRARY=[
    // Speaking Brazilian (Virginia Langhammer) — chaîne principale
    {videoId:"eVCXr41exPE",title:"Les 3 temps verbaux essentiels du portugais brésilien",channel:"Speaking Brazilian",tags:["grammaire","débutant"],level:"🟢 Débutant"},
    {videoId:"fkLv6azXlvU",title:"Être poli en portugais brésilien — expressions et formules",channel:"Speaking Brazilian",tags:["vocabulaire","débutant"],level:"🟢 Débutant"},
    {videoId:"MnJYSeZvYZ0",title:"Verbes irréguliers en portugais — leçon complète",channel:"Speaking Brazilian",tags:["grammaire","intermédiaire"],level:"🟡 Intermédiaire"},
    {videoId:"m-OLshYF07I",title:"Voyelles nasales en portugais brésilien — prononciation",channel:"Speaking Brazilian",tags:["prononciation","débutant"],level:"🟢 Débutant"},
    {videoId:"chgPxMAD5xw",title:"Prononcer le R en portugais brésilien",channel:"Speaking Brazilian",tags:["prononciation","débutant"],level:"🟢 Débutant"},
    {videoId:"_5hzrk5Odyg",title:"Mots similaires en portugais et en anglais",channel:"Speaking Brazilian",tags:["vocabulaire","débutant"],level:"🟢 Débutant"},
    {videoId:"-C-btAPV4B8",title:"Lier les mots comme un natif brésilien",channel:"Speaking Brazilian",tags:["prononciation","avancé"],level:"🔴 Avancé"},
    {videoId:"I__eJ7Cai58",title:"Réduire les mots comme un Brésilien natif",channel:"Speaking Brazilian",tags:["prononciation","intermédiaire"],level:"🟡 Intermédiaire"},
    {videoId:"U6Z2PKb8ksg",title:"PÃO ou PAU ? — Test de prononciation avancé",channel:"Speaking Brazilian",tags:["prononciation","intermédiaire"],level:"🟡 Intermédiaire"},
    {videoId:"3pTRsazcBhk",title:"Prononcer la lettre S en portugais brésilien",channel:"Speaking Brazilian",tags:["prononciation","débutant"],level:"🟢 Débutant"},
    {videoId:"xhcN8FH3csw",title:"Sons difficiles du portugais brésilien pour francophones",channel:"Speaking Brazilian",tags:["prononciation","débutant"],level:"🟢 Débutant"},
    {videoId:"Xqhl0W_8oCg",title:"7 mots courants en français qui n'existent pas en portugais",channel:"Speaking Brazilian",tags:["vocabulaire","intermédiaire"],level:"🟡 Intermédiaire"},
    {videoId:"nxhu86lVxtA",title:"Tudo vs Todo — différence et utilisation en portugais",channel:"Speaking Brazilian",tags:["grammaire","intermédiaire"],level:"🟡 Intermédiaire"},
    // Street Smart Brazil
    {videoId:"LcrJfc7FRow",title:"Apprendre le portugais avec des chansons brésiliennes #1",channel:"Street Smart Brazil",tags:["musique","débutant"],level:"🟢 Débutant"},
  ];

  // Filtre selon la recherche (titre, tags, level)
  const qLower=q.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
  const keywords=qLower.split(/\s+/).filter(Boolean);
  
  const scored=VIDEO_LIBRARY.map(v=>{
    const haystack=(v.title+" "+v.channel+" "+v.tags.join(" ")+" "+v.level).toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
    const score=keywords.reduce((acc,kw)=>acc+(haystack.includes(kw)?2:0),0);
    return {...v,score};
  }).sort((a,b)=>b.score-a.score);

  // Si score 0 pour tout, on affiche tous les résultats mélangés
  const hasMatch=scored.some(v=>v.score>0);
  const results=(hasMatch?scored:VIDEO_LIBRARY).slice(0,8);

  const items=results.map(v=>({
    url:`https://www.youtube.com/watch?v=${v.videoId}`,
    title:`${v.level} — ${v.title}`,
    uploaderName:v.channel,
    thumbnail:`https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg`,
    duration:0,views:0,uploadedDate:""
  }));
  videoResults=items;
  renderVideoCards(container,items);
  btn.disabled=false;
  return;

  // Fallback
  container.innerHTML=`<div class="videos-empty"><div class="videos-empty-icon">🎬</div><p style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px">Recherche indisponible.<br>Cherche "<strong>${q}</strong>" directement sur YouTube :</p><a href="https://www.youtube.com/results?search_query=${encodeURIComponent(q+" portugais brésilien apprendre")}" target="_blank" class="btn btn-p" style="display:inline-flex;text-decoration:none;padding:12px 20px">▶ Ouvrir YouTube</a></div>`;
  btn.disabled=false;
}

function renderVideoCards(container,items){
  container.innerHTML="";
  if(!items.length){container.innerHTML=`<div class="videos-empty"><div class="videos-empty-icon">😕</div><p>Aucun résultat</p></div>`;return;}
  items.forEach(item=>{
    const videoId=(item.url||"").replace("/watch?v=","");
    const ytUrl=`https://www.youtube.com/watch?v=${videoId}`;
    const thumb=item.thumbnail||item.thumbnailUrl||"";
    const a=document.createElement("a");
    a.className="vid-card";a.href=ytUrl;a.target="_blank";a.rel="noopener";
    a.innerHTML=`
      <div style="position:relative;flex-shrink:0">
        ${thumb?`<img class="vid-thumb" src="${thumb}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=vid-thumb-placeholder>▶</div>'">`:`<div class="vid-thumb-placeholder">▶</div>`}
        ${item.duration?`<span class="vid-duration" style="position:absolute;bottom:4px;right:4px">${fmtDuration(item.duration)}</span>`:""}
      </div>
      <div class="vid-info">
        <div class="vid-title">${item.title||"Vidéo"}</div>
        <div class="vid-channel">${item.uploaderName||""}</div>
        <div class="vid-meta">${item.views?`<span>${fmtViews(item.views)}</span>`:""}${item.uploadedDate?`<span>${item.uploadedDate}</span>`:""}</div>
      </div>`;
    container.appendChild(a);
  });
}

function renderArgot(){
  const wrap=document.createElement("div");
  wrap.style.cssText="padding-top:14px";
  let activeTab=0;

  function build(){
    wrap.innerHTML=`
      <p class="lbl" style="margin-top:0">🤙 Argot des jeunes brésiliens</p>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6">Les expressions que les Brésiliens utilisent vraiment entre amis. Avec niveau de familiarité : 🟢 courant · 🟡 argot · 🔴 très familier</p>
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;margin-bottom:16px">
        ${ARGOT_DATA.map((c,i)=>`<button class="v-tab${i===activeTab?" active":""}" data-i="${i}" style="flex-shrink:0">${c.cat}</button>`).join("")}
      </div>
      <div id="argot-list"></div>
    `;
    wrap.querySelectorAll(".v-tab").forEach(btn=>{
      btn.addEventListener("click",()=>{activeTab=parseInt(btn.dataset.i);build();});
    });
    const list=wrap.querySelector("#argot-list");
    ARGOT_DATA[activeTab].items.forEach(item=>{
      const fam=["","🟢 Courant","🟢 Courant","🟡 Argot","🔴 Très familier"][item.fam]||"🟢";
      const card=document.createElement("div");
      card.style.cssText="background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s";
      card.innerHTML=`
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
          <div style="font-family:var(--fw);font-size:22px;font-weight:600;font-style:italic;color:#fff">${item.pt}</div>
          <span style="font-size:10px;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--muted);white-space:nowrap;margin-left:8px">${fam}</span>

        <div style="font-size:14px;color:var(--txt);font-weight:600;margin-bottom:4px">🇫🇷 ${item.fr}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5">${item.ctx}</div>

          <div style="font-style:italic;color:var(--txt);font-size:13px;margin-bottom:3px">"${item.ex}"</div>

      `;
      list.appendChild(card);
    });
  }
  build();
  return wrap;
}

let dialogueActive=null;
let dialogueHistory=[];
let dialogueScene=null;

function renderDialogue(){
  const wrap=document.createElement("div");
  wrap.style.cssText="padding-top:14px";
  showDialogueList(wrap);
  return wrap;
}

function showDialogueList(wrap){
  wrap.innerHTML=`
    <p class="lbl" style="margin-top:0">🎭 Dialogues interactifs</p>
    <p style="font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6">Des histoires avec choix de réponses. Tes décisions changeront la conversation !</p>
    <div style="display:flex;flex-direction:column;gap:12px">
      ${DIALOGUES.map(d=>`
        <div class="dlg-card" data-id="${d.id}" style="background:linear-gradient(135deg,${d.color}12,${d.color}05);border:1.5px solid ${d.color}35;border-radius:18px;padding:18px;cursor:pointer;transition:transform .15s,box-shadow .15s">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
            <span style="font-size:32px">${d.icon}</span>
            <div>
              <div style="font-family:var(--fd);font-size:17px;font-weight:800;color:var(--txt)">${d.title}</div>
              <div style="font-size:11px;color:${d.color};font-weight:600;margin-top:2px">Histoire interactive</div>
            </div>
          </div>
          <p style="font-size:13px;color:var(--muted);line-height:1.6">${d.desc}</p>
        </div>
      `).join("")}
    </div>
  `;
  wrap.querySelectorAll(".dlg-card").forEach(card=>{
    card.addEventListener("mouseenter",()=>{card.style.transform="translateY(-2px)";card.style.boxShadow="0 8px 24px rgba(0,0,0,.3)";});
    card.addEventListener("mouseleave",()=>{card.style.transform="";card.style.boxShadow="";});
    card.addEventListener("click",()=>{
      const d=DIALOGUES.find(x=>x.id===card.dataset.id);
      startDialogue(wrap,d);
    });
  });
}

function startDialogue(wrap,dialogue){
  dialogueActive=dialogue;
  dialogueHistory=[];
  dialogueScene=dialogue.scenes[0];
  playDialogueScene(wrap);
}

function playDialogueScene(wrap){
  const d=dialogueActive;
  const scene=dialogueScene;
  dialogueHistory.push(scene);

  wrap.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button id="dlg-back" style="background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer">← Quitter</button>
      <div style="font-family:var(--fd);font-size:15px;font-weight:700;flex:1;text-align:center">${d.icon} ${d.title}</div>
    </div>

    <div id="dlg-history" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;max-height:50vh;overflow-y:auto;padding-right:4px;scrollbar-width:none"></div>

    ${!scene.end?`
    <div style="background:var(--surf);border:1px solid var(--brd2);border-radius:16px;padding:14px 16px;margin-bottom:14px">
      <div style="font-size:11px;color:var(--red);font-weight:600;font-family:var(--fm);margin-bottom:8px">${scene.speaker}</div>
      <div style="font-family:var(--fw);font-size:17px;font-style:italic;color:var(--txt);margin-bottom:6px;line-height:1.5">"${scene.text}"</div>
      <div style="font-size:12px;color:var(--muted);font-style:italic">🇫🇷 ${scene.trans}</div>
      <button style="margin-top:10px;background:rgba(255,41,82,.1);border:1px solid rgba(255,41,82,.2);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--red);cursor:pointer" onclick="speak('${scene.text.replace(/'/g,"\\'").replace(/"/g,'\\"')}')">🔊</button>
    </div>
    <p style="font-size:11px;color:var(--muted);font-family:var(--fm);margin-bottom:10px;letter-spacing:.5px">TA RÉPONSE :</p>
    <div style="display:flex;flex-direction:column;gap:8px" id="dlg-choices">
      ${scene.choices.map((c,i)=>`
        <button class="dlg-choice" data-next="${c.next}" style="text-align:left;padding:14px 16px;background:var(--surf);border:1.5px solid var(--brd);border-radius:14px;cursor:pointer;transition:all .15s">
          <div style="font-family:var(--fw);font-size:14px;font-style:italic;color:var(--txt);margin-bottom:3px">${c.txt}</div>
          <div style="font-size:11.5px;color:var(--muted)">🇫🇷 ${c.trans}</div>
        </button>
      `).join("")}
    </div>
    `:`
    <div style="text-align:center;padding:28px 16px;background:linear-gradient(135deg,${d.color}15,${d.color}05);border:1.5px solid ${d.color}35;border-radius:18px">
      <div style="font-size:48px;margin-bottom:14px">${d.icon}</div>
      <div style="font-family:var(--fd);font-size:20px;font-weight:800;margin-bottom:10px">Dialogue terminé !</div>
      <div style="font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:6px;font-style:italic">"${scene.text}"</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:24px">🇫🇷 ${scene.trans}</div>
      <button id="dlg-restart" class="btn btn-p" style="margin-bottom:10px;width:100%">🔄 Rejouer</button>
      <button id="dlg-list" class="btn btn-s" style="width:100%">← Autres dialogues</button>
    </div>
    `}
  `;

  // Render history
  const hist=wrap.querySelector("#dlg-history");
  if(hist && dialogueHistory.length>1){
    dialogueHistory.slice(0,-1).forEach(s=>{
      const el=document.createElement("div");
      el.style.cssText="font-size:12px;color:var(--dim);padding:8px 12px;background:var(--surf);border-radius:10px;border:1px solid var(--brd);line-height:1.5";
      el.innerHTML=`<strong style="color:var(--muted)">${s.speaker}</strong> — <em>${s.text}</em>`;
      hist.appendChild(el);
    });
    hist.scrollTop=hist.scrollHeight;
  }

  wrap.querySelectorAll(".dlg-choice").forEach(btn=>{
    btn.addEventListener("mouseenter",()=>{btn.style.borderColor="var(--brd2)";btn.style.background="var(--surf2)";});
    btn.addEventListener("mouseleave",()=>{btn.style.borderColor="var(--brd)";btn.style.background="var(--surf)";});
    btn.addEventListener("click",()=>{
      const nextId=btn.dataset.next;
      dialogueScene=d.scenes.find(s=>s.id===nextId);
      if(dialogueScene) playDialogueScene(wrap);
    });
  });

  const backBtn=wrap.querySelector("#dlg-back");
  if(backBtn) backBtn.addEventListener("click",()=>{wrap.innerHTML="";showDialogueList(wrap);});
  const restartBtn=wrap.querySelector("#dlg-restart");
  if(restartBtn) restartBtn.addEventListener("click",()=>startDialogue(wrap,d));
  const listBtn=wrap.querySelector("#dlg-list");
  if(listBtn) listBtn.addEventListener("click",()=>{wrap.innerHTML="";showDialogueList(wrap);});
}

// ── MEMORY ──
function startMemory(wrap){
  const pool=ALL_WORDS.sort(()=>Math.random()-.5).slice(0,8);
  const cards=[
    ...pool.map((w,i)=>({id:i,pairId:i,type:"pt",text:w.pt,word:w})),
    ...pool.map((w,i)=>({id:i+8,pairId:i,type:"fr",text:w.fr,word:w})),
  ].sort(()=>Math.random()-.5);

  let flipped=[],matched=[],moves=0,done=false;

  function render(){
    wrap.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <button id="mem-back" style="background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer">← Quitter</button>
        <div style="flex:1;text-align:center">
          <span style="font-family:var(--fd);font-size:16px;font-weight:800">🃏 Memory</span>
        </div>
        <div style="font-family:var(--fm);font-size:13px;color:var(--muted)">Coups: <strong style="color:var(--txt)">${moves}</strong></div>
      </div>
      <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px">${matched.length/2}/8 paires trouvées</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px" id="mem-grid"></div>
      ${done?`<div style="text-align:center;margin-top:20px">
        <div style="font-size:40px;margin-bottom:10px">🎉</div>
        <div style="font-family:var(--fd);font-size:20px;font-weight:800;margin-bottom:6px">Bravo !</div>
        <div style="color:var(--muted);margin-bottom:16px">Terminé en ${moves} coups</div>
        <button id="mem-retry" class="btn btn-p" style="margin-bottom:8px;width:100%">🔄 Rejouer</button>
      </div>`:""}
    `;
    wrap.querySelector("#mem-back").addEventListener("click",()=>{wrap.innerHTML="";renderJeux_back(wrap);});
    if(done) wrap.querySelector("#mem-retry")?.addEventListener("click",()=>{wrap.innerHTML="";startMemory(wrap);});

    const grid=wrap.querySelector("#mem-grid");
    cards.forEach(card=>{
      const isFlipped=flipped.includes(card.id)||matched.includes(card.pairId);
      const isMatched=matched.includes(card.pairId);
      const el=document.createElement("div");
      el.style.cssText=`
        height:70px;border-radius:12px;display:flex;align-items:center;justify-content:center;
        cursor:${isFlipped?"default":"pointer"};
        font-size:${card.type==="pt"?"13px":"12px"};
        font-family:${card.type==="pt"?"var(--fw)":"var(--fb)"};
        font-style:${card.type==="pt"?"italic":"normal"};
        font-weight:${card.type==="pt"?"600":"500"};
        text-align:center;padding:6px;line-height:1.3;
        transition:all .2s;
        background:${isMatched?"rgba(0,214,143,.15)":isFlipped?"var(--surf2)":"var(--surf)"};
        border:1.5px solid ${isMatched?"rgba(0,214,143,.5)":isFlipped?"var(--brd2)":"var(--brd)"};
        color:${isMatched?"var(--green)":isFlipped?"var(--txt)":"transparent"};
        box-shadow:${isMatched?"0 0 12px rgba(0,214,143,.2)":"none"};
      `;
      el.textContent=isFlipped?card.text:"?";
      if(!isFlipped){
        el.addEventListener("click",()=>{
          if(flipped.length===2||done) return;
          flipped.push(card.id);
          moves++;
          render();
          if(flipped.length===2){
            const [a,b]=flipped.map(id=>cards.find(c=>c.id===id));
            if(a.pairId===b.pairId){
              matched.push(a.pairId);
              flipped=[];
              if(matched.length===8) done=true;
              render();
            } else {
              setTimeout(()=>{flipped=[];render();},900);
            }
          }
        });
      }
      grid.appendChild(el);
    });
  }
  render();
}

function renderJeux_back(wrap){
  const j=renderJeux();
  wrap.appendChild(j);
}

// ── RUSH ──
function startRush(wrap){
  const hiKey="rush_hiscore";
  let pool=ALL_WORDS.sort(()=>Math.random()-.5);
  let idx=0,score=0,timeLeft=60,timer=null,answered=false,rushDone=false;

  function getWord(){return pool[idx%pool.length];}
  function getChoices(){
    const correct=getWord();
    const others=ALL_WORDS.filter(w=>w.id!==correct.id).sort(()=>Math.random()-.5).slice(0,3);
    return [...others,correct].sort(()=>Math.random()-.5);
  }

  function renderQ(){
    const word=getWord();
    const choices=getChoices();
    const hi=parseInt(localStorage.getItem(hiKey)||"0");
    wrap.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <button id="rush-quit" style="background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer">✕</button>
        <div style="flex:1;height:5px;background:var(--brd);border-radius:3px;overflow:hidden">
          <div id="rush-bar" style="height:100%;background:var(--red);border-radius:3px;width:${(timeLeft/60)*100}%;transition:width 1s linear"></div>
        </div>
        <div style="font-family:var(--fm);font-size:20px;font-weight:700;color:${timeLeft<=10?"var(--red)":"var(--txt)"};min-width:32px;text-align:right">${timeLeft}</div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:20px">
        <span style="font-family:var(--fm);font-size:12px;color:var(--muted)">Score: <strong style="color:var(--txt)">${score}</strong></span>
        <span style="font-family:var(--fm);font-size:12px;color:var(--muted)">Record: <strong style="color:var(--gold)">${hi}</strong></span>
      </div>
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:11px;color:var(--muted);font-family:var(--fm);letter-spacing:1px;margin-bottom:10px">TRADUIS EN FRANÇAIS</div>
        <div style="font-family:var(--fw);font-size:40px;font-weight:600;font-style:italic;color:#fff">${word.pt}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px" id="rush-choices">
        ${choices.map(c=>`<button class="rush-btn" data-id="${c.id}" data-correct="${c.id===word.id}" style="padding:14px 16px;background:var(--surf);border:1.5px solid var(--brd);border-radius:14px;font-size:14px;color:var(--txt);cursor:pointer;text-align:left;font-weight:500;transition:all .12s">${c.fr}</button>`).join("")}
      </div>
    `;
    wrap.querySelector("#rush-quit").addEventListener("click",()=>{clearInterval(timer);wrap.innerHTML="";renderJeux_back(wrap);});
    wrap.querySelectorAll(".rush-btn").forEach(btn=>{
      btn.addEventListener("click",()=>{
        if(answered) return;
        answered=true;
        const correct=btn.dataset.correct==="true";
        if(correct) score++;
        btn.style.background=correct?"rgba(0,214,143,.15)":"rgba(255,41,82,.15)";
        btn.style.borderColor=correct?"rgba(0,214,143,.5)":"rgba(255,41,82,.5)";
        btn.style.color=correct?"var(--green)":"var(--red)";
        setTimeout(()=>{idx++;answered=false;if(!rushDone)renderQ();},500);
      });
    });
    if(!timer){
      timer=setInterval(()=>{
        timeLeft--;
        const bar=wrap.querySelector("#rush-bar");
        const timeEl=wrap.querySelector("#rush-bar")?.parentElement?.nextElementSibling;
        if(bar) bar.style.width=`${(timeLeft/60)*100}%`;
        if(timeEl){timeEl.textContent=timeLeft;timeEl.style.color=timeLeft<=10?"var(--red)":"var(--txt)";}
        if(timeLeft<=0){clearInterval(timer);timer=null;rushDone=true;showRushResults();}
      },1000);
    }
  }

  function showRushResults(){
    const hi=parseInt(localStorage.getItem(hiKey)||"0");
    const newHi=score>hi;
    if(newHi) localStorage.setItem(hiKey,String(score));
    wrap.innerHTML=`
      <div style="text-align:center;padding:32px 0">
        <div style="font-size:56px;margin-bottom:12px">${newHi?"🏆":"⚡"}</div>
        <div style="font-family:var(--fd);font-size:28px;font-weight:800;margin-bottom:6px">${score} points</div>
        ${newHi?`<div style="color:var(--gold);font-weight:700;margin-bottom:6px">🥇 Nouveau record !</div>`:""}
        <div style="color:var(--muted);margin-bottom:24px">Record : ${Math.max(score,hi)}</div>
        <button id="rush-retry" class="btn btn-p" style="width:100%;margin-bottom:10px">🔄 Rejouer</button>
        <button id="rush-menu" class="btn btn-s" style="width:100%">← Menu jeux</button>
      </div>
    `;
    wrap.querySelector("#rush-retry").addEventListener("click",()=>{wrap.innerHTML="";startRush(wrap);});
    wrap.querySelector("#rush-menu").addEventListener("click",()=>{wrap.innerHTML="";renderJeux_back(wrap);});
  }

  renderQ();
}

// ── MOTS MÊLÉS ──
function startMotsMeles(wrap){
  const WORDS_MM=[
    {pt:"AGUA",fr:"eau"},{pt:"CASA",fr:"maison"},{pt:"AMOR",fr:"amour"},
    {pt:"SOL",fr:"soleil"},{pt:"PAO",fr:"pain"},{pt:"MAE",fr:"maman"},
    {pt:"GATO",fr:"chat"},{pt:"BOLA",fr:"balle"},
  ];
  const SIZE=10;
  let grid=Array.from({length:SIZE},()=>Array(SIZE).fill(""));
  let placed=[];
  const DIRS=[[0,1],[1,0],[1,1],[0,-1],[-1,0]];

  // Place words
  WORDS_MM.forEach(w=>{
    let tries=0,ok=false;
    while(!ok&&tries<200){
      tries++;
      const dir=DIRS[Math.floor(Math.random()*DIRS.length)];
      const r=Math.floor(Math.random()*SIZE);
      const c=Math.floor(Math.random()*SIZE);
      const cells=[];
      let valid=true;
      for(let i=0;i<w.pt.length;i++){
        const nr=r+dir[0]*i, nc=c+dir[1]*i;
        if(nr<0||nr>=SIZE||nc<0||nc>=SIZE){valid=false;break;}
        if(grid[nr][nc]&&grid[nr][nc]!==w.pt[i]){valid=false;break;}
        cells.push([nr,nc]);
      }
      if(valid){
        cells.forEach(([nr,nc],i)=>grid[nr][nc]=w.pt[i]);
        placed.push({word:w,cells});
        ok=true;
      }
    }
  });
  // Fill blanks
  const alpha="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!grid[r][c]) grid[r][c]=alpha[Math.floor(Math.random()*alpha.length)];

  let found=[],selecting=false,selStart=null,selCells=[];

  function render(){
    wrap.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <button id="mm-back" style="background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer">← Quitter</button>
        <div style="flex:1;text-align:center;font-family:var(--fd);font-size:16px;font-weight:800">🔡 Mots mêlés</div>
        <div style="font-family:var(--fm);font-size:13px;color:var(--muted)">${found.length}/${WORDS_MM.length}</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
        ${WORDS_MM.map(w=>{
          const f=found.some(f=>f.pt===w.pt);
          return `<span style="padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:${f?"rgba(0,214,143,.15)":"var(--surf)"};border:1px solid ${f?"rgba(0,214,143,.4)":"var(--brd)"};color:${f?"var(--green)":"var(--muted)"};text-decoration:${f?"line-through":"none"}">${f?"✓ ":""}<em>${w.pt.toLowerCase()}</em> = ${w.fr}</span>`;
        }).join("")}
      </div>
      <div id="mm-grid" style="display:grid;grid-template-columns:repeat(${SIZE},1fr);gap:3px;user-select:none;touch-action:none"></div>
      ${found.length===WORDS_MM.length?`<div style="text-align:center;margin-top:20px">
        <div style="font-size:40px;margin-bottom:10px">🎉</div>
        <div style="font-family:var(--fd);font-size:20px;font-weight:800;margin-bottom:16px">Tous les mots trouvés !</div>
        <button id="mm-retry" class="btn btn-p" style="width:100%;margin-bottom:8px">🔄 Rejouer</button>
      </div>`:""}
    `;
    wrap.querySelector("#mm-back").addEventListener("click",()=>{wrap.innerHTML="";renderJeux_back(wrap);});
    wrap.querySelector("#mm-retry")?.addEventListener("click",()=>{wrap.innerHTML="";startMotsMeles(wrap);});

    const g=wrap.querySelector("#mm-grid");
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const el=document.createElement("div");
        const isFound=found.some(f=>f.cells.some(([fr,fc])=>fr===r&&fc===c));
        const isSel=selCells.some(([sr,sc])=>sr===r&&sc===c);
        el.dataset.r=r;el.dataset.c=c;
        el.style.cssText=`
          aspect-ratio:1;display:flex;align-items:center;justify-content:center;
          border-radius:6px;font-family:var(--fm);font-size:13px;font-weight:700;
          cursor:pointer;
          background:${isFound?"rgba(0,214,143,.2)":isSel?"rgba(255,41,82,.25)":"var(--surf)"};
          color:${isFound?"var(--green)":isSel?"var(--red)":"var(--txt)"};
          border:1px solid ${isFound?"rgba(0,214,143,.3)":isSel?"rgba(255,41,82,.4)":"var(--brd)"};
          transition:background .1s;
        `;
        el.textContent=grid[r][c];
        el.addEventListener("mousedown",()=>{selecting=true;selStart=[r,c];selCells=[[r,c]];render();});
        el.addEventListener("mouseover",()=>{
          if(!selecting) return;
          // Build line from selStart to current
          const cells=[];
          const dr=r-selStart[0],dc=c-selStart[1];
          const len=Math.max(Math.abs(dr),Math.abs(dc));
          if(len>0&&(dr===0||dc===0||Math.abs(dr)===Math.abs(dc))){
            const sr=Math.sign(dr),sc=Math.sign(dc);
            for(let i=0;i<=len;i++) cells.push([selStart[0]+sr*i,selStart[1]+sc*i]);
            selCells=cells;render();
          }
        });
        el.addEventListener("mouseup",()=>{
          if(!selecting) return;
          selecting=false;
          const word=selCells.map(([r,c])=>grid[r][c]).join("");
          const match=placed.find(p=>p.word.pt===word||p.word.pt===word.split("").reverse().join(""));
          if(match&&!found.some(f=>f.pt===match.word.pt)){
            found.push({pt:match.word.pt,cells:selCells});
          }
          selCells=[];selStart=null;render();
        });
        g.appendChild(el);
      }
    }
    // Touch support
    g.addEventListener("touchstart",e=>{
      const t=e.touches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      if(el?.dataset?.r){selecting=true;selStart=[+el.dataset.r,+el.dataset.c];selCells=[[+el.dataset.r,+el.dataset.c]];render();}
    },{passive:true});
    g.addEventListener("touchmove",e=>{
      e.preventDefault();
      const t=e.touches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      if(el?.dataset?.r&&selecting){
        const r=+el.dataset.r,c=+el.dataset.c;
        const cells=[];
        const dr=r-selStart[0],dc=c-selStart[1];
        const len=Math.max(Math.abs(dr),Math.abs(dc));
        if(len>0&&(dr===0||dc===0||Math.abs(dr)===Math.abs(dc))){
          const sr=Math.sign(dr),sc=Math.sign(dc);
          for(let i=0;i<=len;i++) cells.push([selStart[0]+sr*i,selStart[1]+sc*i]);
          selCells=cells;render();
        }
      }
    },{passive:false});
    g.addEventListener("touchend",()=>{
      if(!selecting) return;
      selecting=false;
      const word=selCells.map(([r,c])=>grid[r][c]).join("");
      const match=placed.find(p=>p.word.pt===word||p.word.pt===word.split("").reverse().join(""));
      if(match&&!found.some(f=>f.pt===match.word.pt)){found.push({pt:match.word.pt,cells:selCells});}
      selCells=[];selStart=null;render();
    });
  }
  render();
}

function exportProgress(){
  const data={
    version:1,
    date:new Date().toISOString(),
    cards:JSON.parse(localStorage.getItem("srs_cards")||"{}"),
    meta:JSON.parse(localStorage.getItem("srs_meta")||"{}"),
    parcours:JSON.parse(localStorage.getItem("parcours_progress")||"{}"),
    rush_hi:localStorage.getItem("rush_hiscore")||"0",
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`falabrasil_progression_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
}

function importProgress(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.version!==1) throw new Error("Format invalide");
      if(data.cards) localStorage.setItem("srs_cards",JSON.stringify(data.cards));
      if(data.meta) localStorage.setItem("srs_meta",JSON.stringify(data.meta));
      if(data.parcours) localStorage.setItem("parcours_progress",JSON.stringify(data.parcours));
      if(data.rush_hi) localStorage.setItem("rush_hiscore",data.rush_hi);
      alert("✅ Progression importée avec succès !");
      goTo("home");
    }catch(err){alert("❌ Fichier invalide : "+err.message);}
  };
  reader.readAsText(file);
}

        💡 <strong>Astuce :</strong> Écoute plusieurs fois avant d'écrire. Le portugais brésilien avale les syllabes — 
        <em>você</em> se prononce <em>"você"</em> avec le E final très court. Bonne chance !
      </p>
    </div>
  `;
  wrap.querySelectorAll(".dictee-level-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const level = parseInt(btn.dataset.level);
      startDictee(wrap, level);
    });
  });
}

function startDictee(wrap, level) {
  const pool = level === 0
    ? [...DICTEE_POOL].sort(() => Math.random() - .5)
    : DICTEE_POOL.filter(x => x.level === level).sort(() => Math.random() - .5);
  dicteeState = { level, queue: pool, idx: 0, score: 0, total: pool.length, answered: false, current: pool[0] };
  showDicteeQuestion(wrap);
}

function normalize(str) {
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[?!.,;:]/g, "")
    .trim();
}

function showDicteeQuestion(wrap) {
  const { queue, idx, score, total } = dicteeState;
  if (idx >= total) { showDicteeResults(wrap); return; }
  const item = queue[idx];
  dicteeState.current = item;
  dicteeState.answered = false;
  const pct = Math.round((idx / total) * 100);

  wrap.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <button id="back-dictee" style="background:rgba(255,252,245,.07);border:1px solid var(--brd);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer">← Quitter</button>
      <div style="flex:1;height:5px;background:rgba(255,252,245,.07);border-radius:3px">
        <div style="width:${pct}%;height:100%;background:#5EC4FF;border-radius:3px;transition:width .4s"></div>
      </div>
      <span style="font-size:11px;color:var(--muted);font-weight:700">${idx+1}/${total}</span>
    </div>

    <div style="text-align:center;margin-bottom:28px">
      <p style="font-size:12px;color:var(--muted);margin-bottom:16px">Écoute et écris ce que tu entends :</p>
      <button id="play-btn" style="width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,rgba(94,196,255,.2),rgba(26,122,175,.15));border:2px solid rgba(94,196,255,.4);font-size:36px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 0 28px rgba(94,196,255,.2)">🔊</button>
      <p style="font-size:11px;color:var(--muted);margin-top:10px">Appuie pour écouter · Tu peux réécouter autant de fois que tu veux</p>
    </div>

    <div style="margin-bottom:16px">
      <input id="dictee-input" type="text" placeholder="Écris ce que tu as entendu…" autocomplete="off" autocorrect="off" spellcheck="false"
        style="width:100%;background:rgba(255,252,245,.07);border:2px solid var(--brd);border-radius:14px;padding:14px 18px;font-size:16px;color:var(--txt);outline:none;font-family:var(--fb);transition:border-color .2s"/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button id="hint-btn" class="btn btn-s" style="font-size:13px">💡 Indice</button>
      <button id="check-btn" class="btn btn-p" style="font-size:13px">✓ Vérifier</button>
    </div>
    <div id="dictee-feedback" style="margin-top:16px"></div>
    <p style="text-align:center;font-size:11px;color:var(--dim);margin-top:12px">Score : ${score}/${idx} ✓</p>
  `;

  const input = wrap.querySelector("#dictee-input");
  const playBtn = wrap.querySelector("#play-btn");
  const checkBtn = wrap.querySelector("#check-btn");
  const hintBtn = wrap.querySelector("#hint-btn");
  const feedback = wrap.querySelector("#dictee-feedback");

  // Auto-play on load
  setTimeout(() => speakDictee(item.pt), 400);

  playBtn.addEventListener("click", () => {
    playBtn.style.transform = "scale(.92)";
    setTimeout(() => playBtn.style.transform = "", 150);
    speakDictee(item.pt);
  });
  playBtn.addEventListener("mouseenter", () => { playBtn.style.boxShadow = "0 0 36px rgba(94,196,255,.4)"; });
  playBtn.addEventListener("mouseleave", () => { playBtn.style.boxShadow = "0 0 28px rgba(94,196,255,.2)"; });

  hintBtn.addEventListener("click", () => {
    if (dicteeState.answered) return;
    const hint = item.pt.split("").map((c, i) => i === 0 || c === " " ? c : "_").join("");
    feedback.innerHTML = `<div style="background:rgba(242,178,51,.08);border:1px solid rgba(242,178,51,.3);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--gold2)">
      💡 Indice : <strong>${hint}</strong><br><span style="font-size:11px;opacity:.7">🇫🇷 ${item.fr}</span></div>`;
  });

  const doCheck = () => {
    if (dicteeState.answered) {
      dicteeState.idx++;
      showDicteeQuestion(wrap);
      return;
    }
    const val = input.value.trim();
    if (!val) { input.style.borderColor = "rgba(255,94,44,.5)"; setTimeout(() => input.style.borderColor = "", 600); return; }
    dicteeState.answered = true;
    const correct = normalize(val) === normalize(item.pt);
    if (correct) dicteeState.score++;
    input.style.borderColor = correct ? "#45D68A" : "#FF5E2C";
    feedback.innerHTML = `
      <div style="background:${correct ? "rgba(69,214,138,.08)" : "rgba(255,94,44,.08)"};border:1px solid ${correct ? "rgba(69,214,138,.35)" : "rgba(255,94,44,.35)"};border-radius:14px;padding:14px 16px">
        <div style="font-size:16px;margin-bottom:6px">${correct ? "✅ Parfait !" : "❌ Pas tout à fait…"}</div>
        ${!correct ? `<div style="font-size:13px;color:var(--txt);margin-bottom:4px">Réponse : <strong>${item.pt}</strong></div>` : ""}
        <div style="font-size:12px;color:var(--muted)">🇫🇷 ${item.fr}</div>
      </div>
      <button id="next-dictee" class="btn btn-p btn-full" style="margin-top:12px">${dicteeState.idx + 1 >= dicteeState.total ? "🏆 Voir les résultats" : "Suivant →"}</button>
    `;
    speakDictee(item.pt);
    wrap.querySelector("#next-dictee").addEventListener("click", () => {
      dicteeState.idx++;
      showDicteeQuestion(wrap);
    });
    checkBtn.textContent = dicteeState.idx + 1 >= dicteeState.total ? "🏆 Résultats" : "Suivant →";
  };

  checkBtn.addEventListener("click", doCheck);
  input.addEventListener("keydown", e => { if (e.key === "Enter") doCheck(); });
  wrap.querySelector("#back-dictee").addEventListener("click", () => { wrap.innerHTML = ""; showDicteeMenu(wrap); });
  input.focus();
}

function speakDictee(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "pt-BR"; u.rate = 0.8; u.pitch = 1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function showDicteeResults(wrap) {
  const { score, total } = dicteeState;
  const pct = Math.round((score / total) * 100);
  const msg = pct === 100 ? "Oreille parfaite ! 🏆" : pct >= 80 ? "Très bien ! 💪" : pct >= 60 ? "Pas mal, continue ! 👍" : "Continue de t'entraîner 🎯";
  wrap.innerHTML = `
    <div style="text-align:center;padding:32px 0">
      <div style="font-size:64px;margin-bottom:16px">${pct === 100 ? "🏆" : pct >= 80 ? "🎉" : "🎯"}</div>
      <h2 style="font-family:var(--fd);font-size:26px;font-weight:900;margin-bottom:8px">${msg}</h2>
      <div style="font-size:18px;color:var(--muted);margin-bottom:6px">${score} / ${total} correctes</div>
      <div style="font-size:36px;font-weight:900;color:#5EC4FF;margin-bottom:24px">${pct}%</div>
      <button id="retry-dictee" class="btn btn-p btn-full" style="margin-bottom:10px">🔄 Rejouer ce niveau</button>
      <button id="menu-dictee" class="btn btn-s btn-full">← Choisir un niveau</button>
    </div>
  `;
  wrap.querySelector("#retry-dictee").addEventListener("click", () => startDictee(wrap, dicteeState.level));
  wrap.querySelector("#menu-dictee").addEventListener("click", () => { wrap.innerHTML = ""; showDicteeMenu(wrap); });
}

function showChansonPlayer(wrap, song) {

      </div>`;
    verse.lines.forEach((line, li) => {
      html += `<div class="lyric-line" style="display:flex;flex-wrap:wrap;gap:4px;align-items:baseline;margin-bottom:10px;padding:6px 8px;border-radius:10px;transition:background .2s" data-verse="${vi}" data-line="${li}">`;
      line.forEach((word, wi) => {
        html += `<span class="lyric-word" data-pt="${word.pt}" data-fr="${word.fr}" data-vi="${vi}" data-li="${li}" data-wi="${wi}"
          style="font-family:var(--fd);font-size:20px;font-weight:700;color:var(--txt);cursor:pointer;padding:2px 4px;border-radius:6px;transition:background .15s,color .15s">${word.pt}</span>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  });

  html += `
    <div style="background:rgba(255,252,245,.04);border:1px solid var(--brd);border-radius:14px;padding:14px 16px;margin-top:8px;margin-bottom:16px">
      <p style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:10px">Vocabulaire clé</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${song.vocab_focus.map(w => `<span class="vocab-pill" data-word="${w}" style="background:${song.color}18;border:1px solid ${song.color}35;border-radius:20px;padding:4px 12px;font-size:12px;color:${song.color};font-weight:600;cursor:pointer">${w}</span>`).join("")}
      </div>
    </div>
  `;

  wrap.innerHTML = html;

  // Tooltip logic
  const tooltip = wrap.querySelector("#tooltip-box");
  const tooltipPt = wrap.querySelector("#tooltip-pt");
  const tooltipFr = wrap.querySelector("#tooltip-fr");

  wrap.querySelectorAll(".lyric-word").forEach(word => {
    word.addEventListener("click", () => {
      wrap.querySelectorAll(".lyric-word").forEach(w => {
        w.style.background = "";
        w.style.color = "var(--txt)";
      });
      word.style.background = song.color + "35";
      word.style.color = song.color;
      tooltipPt.textContent = word.dataset.pt;
      tooltipFr.textContent = "🇫🇷 " + word.dataset.fr;
      tooltip.style.display = "block";
      speakDictee(word.dataset.pt);
    });
  });

  // Play line buttons
  wrap.querySelectorAll(".play-line-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const vi = parseInt(btn.dataset.verse);
      const verse = song.verses[vi];
      const text = verse.lines.map(l => l.map(w => w.pt).join(" ")).join(". ");
      speakDictee(text);
      // Highlight verse lines
      wrap.querySelectorAll(`.lyric-line[data-verse="${vi}"]`).forEach(line => {
        line.style.background = song.color + "12";
        setTimeout(() => line.style.background = "", 3000);
      });
    });
  });

  // Vocab pills
  wrap.querySelectorAll(".vocab-pill").forEach(pill => {
    pill.addEventListener("click", () => speakDictee(pill.dataset.word));
  });

  wrap.querySelector("#back-chanson").addEventListener("click", () => { wrap.innerHTML = ""; showChansonList(wrap); });
}

// Progress stored in localStorage
function getParcourProgress(){
  try{ return JSON.parse(localStorage.getItem("parcours_progress")||"{}"); }catch(e){ return {}; }
}
function setParcourProgress(id){
  const p=getParcourProgress(); p[id]=true;
  localStorage.setItem("parcours_progress",JSON.stringify(p));
}

let currentLesson=null;
let lessonStep=0; // 0=learn, 1=quiz
let quizState={items:[],idx:0,score:0,choices:[]};

function renderParcours(){
  const wrap=document.createElement("div");
  wrap.style.cssText="padding-top:14px";
  showLessonList(wrap);
  return wrap;
}

function showLessonList(wrap){
  const prog=getParcourProgress();
  wrap.innerHTML=`
    <p class="lbl" style="margin-top:0">Ton parcours d'apprentissage</p>
    <p style="font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6">Chaque leçon se débloque après la précédente. Commence depuis le début — comme un bébé qui apprend à parler 👶</p>
    <div id="lesson-list"></div>
  `;
  const list=wrap.querySelector("#lesson-list");
  PARCOURS_LESSONS.forEach((lesson,i)=>{
    const done=prog[lesson.id];
    const locked=i>0&&!prog[PARCOURS_LESSONS[i-1].id];
    const card=document.createElement("div");
    card.style.cssText=`display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:16px;margin-bottom:10px;border:1.5px solid ${locked?"var(--brd)":done?"rgba(69,214,138,.3)":"rgba("+hexToRgb(lesson.color)+",.35)"};background:${locked?"rgba(255,252,245,.02)":done?"rgba(69,214,138,.05)":"rgba("+hexToRgb(lesson.color)+",.07)"};cursor:${locked?"default":"pointer"};transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden`;
    card.innerHTML=`
      <div style="width:48px;height:48px;border-radius:12px;background:${locked?"rgba(255,252,245,.05)":lesson.color+"22"};display:flex;align-items:center;justify-content:font-size:24px;justify-content:center;flex-shrink:0;font-size:26px;border:1px solid ${locked?"var(--brd)":lesson.color+"55"}">${locked?"🔒":lesson.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px;color:${locked?"var(--muted)":"var(--txt)"};margin-bottom:2px">${lesson.title}</div>
        <div style="font-size:11.5px;color:var(--muted);line-height:1.4">${locked?"Termine la leçon précédente pour débloquer":lesson.subtitle}</div>
        ${lesson.type!=="sounds"?`<div style="font-size:10.5px;color:var(--dim);margin-top:4px">${lesson.items.length} éléments à apprendre</div>`:""}
      </div>
      <div style="flex-shrink:0;font-size:20px">${done?"✅":locked?"":"▶️"}</div>
    `;
    if(!locked){
      card.addEventListener("mouseenter",()=>{ card.style.transform="translateY(-2px)"; card.style.boxShadow=`0 8px 24px rgba(0,0,0,.25)`;});
      card.addEventListener("mouseleave",()=>{ card.style.transform=""; card.style.boxShadow="";});
      card.addEventListener("click",()=>openLesson(wrap,lesson,i));
    }
    list.appendChild(card);
  });
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+","+g+","+b;
}

function openLesson(wrap,lesson,idx){
  currentLesson=lesson;
  lessonStep=0;
  wrap.innerHTML="";
  showLessonLearn(wrap,lesson,idx);
}

function showLessonLearn(wrap,lesson,lessonIdx){
  const isSounds=lesson.type==="sounds";
  let html=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button onclick="" id="back-btn" style="background:rgba(255,252,245,.07);border:1px solid var(--brd);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer">← Retour</button>
      <div style="flex:1;height:4px;background:rgba(255,252,245,.07);border-radius:2px"><div style="width:50%;height:100%;background:${lesson.color};border-radius:2px;transition:width .3s"></div></div>
      <span style="font-size:11px;color:var(--muted);font-weight:700">50%</span>
    </div>
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:42px;margin-bottom:8px">${lesson.icon}</div>
      <h2 style="font-family:var(--fd);font-size:20px;font-weight:900;margin-bottom:4px">${lesson.title}</h2>
      <p style="font-size:12px;color:var(--muted)">${lesson.subtitle}</p>
    </div>
    <p class="lbl" style="margin-top:0">${isSounds?"Sons à retenir":"Mots à apprendre"}</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">
  `;
  
  if(isSounds){
    lesson.items.forEach(item=>{
      html+=`<div style="background:rgba(255,252,245,.05);border:1px solid var(--brd);border-radius:14px;padding:14px 16px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
          <span style="font-family:var(--fd);font-size:20px;font-weight:900;color:${lesson.color};min-width:60px">${item.symbol}</span>
          <span style="font-size:11px;background:rgba(255,252,245,.08);padding:3px 8px;border-radius:8px;color:var(--gold);font-weight:700">${item.sound}</span>
        </div>
        <div style="font-size:13px;color:var(--txt);margin-bottom:4px">${item.desc}</div>
        <div style="font-size:11.5px;color:var(--muted)">Ex : <em>${item.ex}</em></div>
      </div>`;
    });
  } else {
    lesson.items.forEach(item=>{
      html+=`<div style="background:rgba(255,252,245,.05);border:1px solid var(--brd);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px">
        <div style="flex:1">
          <div style="font-size:18px;font-weight:700;color:var(--txt);margin-bottom:3px">${item.pt}</div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:3px">🇫🇷 ${item.fr}</div>
          <div style="font-size:11px;color:${lesson.color};font-weight:600">🔊 ${item.ph}</div>
        </div>
        <button onclick="speak('${item.pt.replace(/'/g,"\'")}')" style="width:38px;height:38px;border-radius:50%;background:${lesson.color}22;border:1px solid ${lesson.color}55;cursor:pointer;font-size:18px;flex-shrink:0">🔊</button>
      </div>`;
    });
  }
  
  html+=`</div>`;
  
  if(!isSounds){
    html+=`<button id="start-quiz-btn" class="btn btn-p btn-full" style="margin-bottom:16px">✅ J'ai appris ces mots — Faire le test !</button>`;
  } else {
    html+=`<button id="start-quiz-btn" class="btn btn-p btn-full" style="margin-bottom:16px">✅ Compris ! Terminer cette leçon</button>`;
  }
  
  wrap.innerHTML=html;
  wrap.querySelector("#back-btn").addEventListener("click",()=>{ wrap.innerHTML=""; showLessonList(wrap); });
  wrap.querySelector("#start-quiz-btn").addEventListener("click",()=>{
    if(isSounds){ setParcourProgress(lesson.id); wrap.innerHTML=""; showLessonComplete(wrap,lesson); }
    else{ wrap.innerHTML=""; startQuiz(wrap,lesson); }
  });
}

function speak(text){
  if(!window.speechSynthesis) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="pt-BR"; u.rate=0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function startQuiz(wrap,lesson){
  // Build shuffled quiz from lesson items
  const items=[...lesson.items].sort(()=>Math.random()-.5);
  quizState={items,idx:0,score:0,lesson};
  showQuizQuestion(wrap);
}

function showQuizQuestion(wrap){
  const {items,idx,score,lesson}=quizState;
  if(idx>=items.length){ setParcourProgress(lesson.id); showLessonComplete(wrap,lesson); return; }
  
  const q=items[idx];
  const progress=Math.round((idx/items.length)*100);
  
  // Build 4 choices: correct + 3 random wrong
  const others=lesson.items.filter(x=>x.pt!==q.pt).sort(()=>Math.random()-.5).slice(0,3);
  const choices=[...others,q].sort(()=>Math.random()-.5);
  
  wrap.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <div style="flex:1;height:4px;background:rgba(255,252,245,.07);border-radius:2px"><div style="width:${50+progress/2}%;height:100%;background:${lesson.color};border-radius:2px"></div></div>
      <span style="font-size:11px;color:var(--muted);font-weight:700">${idx+1}/${items.length}</span>
    </div>
    <div style="text-align:center;margin-bottom:24px">
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">Quelle est la traduction de :</p>
      <div style="font-family:var(--fd);font-size:36px;font-weight:900;color:var(--txt);margin-bottom:6px">${q.pt}</div>
      <div style="font-size:12px;color:${lesson.color}">🔊 ${q.ph}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px" id="choices">
      ${choices.map((c,i)=>`<button class="quiz-choice" data-correct="${c.pt===q.pt}" style="padding:14px 18px;border-radius:14px;border:1.5px solid var(--brd);background:rgba(255,252,245,.05);color:var(--txt);font-size:14px;font-weight:600;text-align:left;cursor:pointer;transition:all .2s">${c.fr}</button>`).join("")}
    </div>
    <p style="text-align:center;font-size:11px;color:var(--dim);margin-top:16px">Score : ${score}/${idx} ✓</p>
  `;
  
  wrap.querySelectorAll(".quiz-choice").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const correct=btn.dataset.correct==="true";
      wrap.querySelectorAll(".quiz-choice").forEach(b=>{
        b.style.pointerEvents="none";
        if(b.dataset.correct==="true") b.style.cssText+=`;border-color:#45D68A;background:rgba(69,214,138,.15);color:#45D68A`;
        else if(b===btn&&!correct) b.style.cssText+=`;border-color:#FF5E2C;background:rgba(255,94,44,.1);color:#FF5E2C`;
      });
      if(correct) quizState.score++;
      speak(q.pt);
      setTimeout(()=>{ quizState.idx++; wrap.innerHTML=""; showQuizQuestion(wrap); },1200);
    });
  });
}

function showLessonComplete(wrap,lesson){
  const total=lesson.items?lesson.items.length:0;
  const {score}=quizState;
  wrap.innerHTML=`
    <div style="text-align:center;padding:32px 16px">
      <div style="font-size:64px;margin-bottom:16px">${quizState.score===total&&total>0?"🏆":"🎉"}</div>
      <h2 style="font-family:var(--fd);font-size:24px;font-weight:900;margin-bottom:8px">Leçon terminée !</h2>
      ${total>0?`<p style="font-size:15px;color:var(--muted);margin-bottom:6px">Score : <strong style="color:${lesson.color}">${score}/${total}</strong></p>`:""}
      <p style="font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6">${lesson.type==="sounds"?"Tu connais maintenant les sons du portugais brésilien !":score===total?"Parfait ! Tu maîtrises tous les mots de cette leçon.":score>=total*.7?"Bien joué ! Continue comme ça.":"Continue de t'entraîner, ça viendra !"}</p>
      <button id="next-lesson-btn" class="btn btn-p btn-full" style="margin-bottom:12px">Leçon suivante →</button>
      <button id="back-list-btn" class="btn btn-s btn-full">← Toutes les leçons</button>
    </div>
  `;
  const prog=getParcourProgress();
  const curIdx=PARCOURS_LESSONS.findIndex(l=>l.id===lesson.id);
  const nextLesson=PARCOURS_LESSONS[curIdx+1];
  
  wrap.querySelector("#next-lesson-btn").addEventListener("click",()=>{
    wrap.innerHTML="";
    if(nextLesson) openLesson(wrap,nextLesson,curIdx+1);
    else showLessonList(wrap);
  });
  wrap.querySelector("#back-list-btn").addEventListener("click",()=>{ wrap.innerHTML=""; showLessonList(wrap); });
  if(!nextLesson) wrap.querySelector("#next-lesson-btn").textContent="🎓 Parcours terminé !";
}

</script>
