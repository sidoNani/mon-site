<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FalaBrasil 🇧🇷</title>

<style>
/* ─────────────────────────────────────────
   FALABRASIL — São Paulo Editorial
   Direction: Bold typographic, tranchant,
   inspiré du design graphique brésilien
───────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Lora:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&family=DM+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Palette */
  --bg:#08080F;
  --bg2:#0E0D1A;
  --surf:#13121F;
  --surf2:#1A1928;
  --brd:rgba(230,225,255,.07);
  --brd2:rgba(230,225,255,.16);

  /* Couleurs vives */
  --red:#FF2952;
  --red2:#FF6B85;
  --green:#00D68F;
  --green2:#00FF9D;
  --gold:#FFD600;
  --gold2:#FFE44D;
  --blue:#4B7BFF;

  /* Texte */
  --txt:#EDE8DD;
  --muted:rgba(237,232,221,.44);
  --dim:rgba(237,232,221,.22);

  /* Typo */
  --fd:'Syne',sans-serif;
  --fb:'Cabinet Grotesk',sans-serif;
  --fm:'DM Mono',monospace;
  --fw:'Lora',Georgia,serif;

  /* Géométrie */
  --r:10px;
  --rl:16px;
  --r-pill:100px;
}

html,body,#app{height:100%}
body{font-family:var(--fb);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.5}
button{font-family:var(--fb);cursor:pointer}
input{font-family:var(--fb)}

/* Scrollbar */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,41,82,.35);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,41,82,.6)}

/* Ambiance fond */
body::before{
  content:'';position:fixed;top:0;right:0;width:320px;height:320px;
  background:conic-gradient(from 220deg at 75% 15%,rgba(255,41,82,.07) 0deg,transparent 80deg,rgba(0,214,143,.04) 210deg,transparent 360deg);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;bottom:80px;left:-40px;width:220px;height:220px;
  background:radial-gradient(circle,rgba(75,123,255,.05) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── Layout ── */
#app{max-width:480px;min-height:100dvh;margin:0 auto;display:flex;flex-direction:column;position:relative}
#content{flex:1;padding:0 18px 108px;position:relative;z-index:1;overflow-y:auto;overflow-x:hidden}

/* ── Header ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;
  background:rgba(8,8,15,.94);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--brd);
  position:sticky;top:0;z-index:50;
}
.logo{
  font-family:var(--fd);font-size:20px;font-weight:800;
  letter-spacing:-.5px;color:var(--txt);
  display:flex;align-items:center;gap:8px;
}
.logo::before{
  content:'';display:block;width:10px;height:10px;
  border-radius:3px;background:var(--red);
  transform:rotate(12deg);
}

.pills{display:flex;gap:5px}
.pill{
  display:flex;align-items:center;gap:4px;
  padding:4px 10px;
  background:var(--surf);
  border:1px solid var(--brd);
  border-radius:var(--r-pill);
  font-size:11px;font-weight:600;
  font-family:var(--fm);
  color:var(--muted);
}
.pill-fire{color:#FF6B35}
.pill-xp{color:var(--gold)}

/* ── Nav ── */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  display:flex;
  background:rgba(8,8,15,.98);
  backdrop-filter:blur(28px);
  border-top:1px solid var(--brd);
  z-index:50;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  gap:2px;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:8px 4px 6px;border:none;background:none;
  color:rgba(237,232,221,.3);
  transition:color .18s;position:relative;
  border-radius:12px;
}
.nav-btn.active{
  color:var(--txt);
  background:rgba(255,255,255,.06);
}
.nav-btn:active{transform:scale(.91)}

/* Icône wrapper */
.nav-ico{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(237,232,221,.05);
  transition:background .2s,transform .2s,box-shadow .2s;
  position:relative;
}
.nav-ico svg{width:20px;height:20px;transition:transform .2s}
.nav-btn.active .nav-ico{
  background:var(--red);
  transform:translateY(-3px);
  box-shadow:0 8px 20px rgba(255,41,82,.4),0 2px 6px rgba(255,41,82,.2);
}
.nav-btn.active .nav-ico svg{transform:scale(1.05)}

/* Label */
.nav-lbl{
  font-size:9px;font-weight:600;
  letter-spacing:.3px;
  font-family:var(--fb);
  line-height:1;
  color:inherit;
}
.nav-btn.active .nav-lbl{
  color:var(--txt);
}

.nav-badge{
  position:absolute;top:-3px;right:-3px;
  background:var(--red);color:#fff;
  border-radius:var(--r-pill);
  font-size:8px;font-weight:700;
  padding:1px 4px;
  border:1.5px solid var(--bg);
}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:8px;border:none;border-radius:var(--r);
  font-weight:700;font-size:15px;
  transition:transform .12s,opacity .12s;
  cursor:pointer;letter-spacing:-.1px;
  font-family:var(--fb);
}
.btn:active{transform:scale(.96);opacity:.9}
.btn-p{
  background:var(--red);color:#fff;
  padding:14px 24px;
  font-weight:700;font-size:14px;
  letter-spacing:.2px;
  position:relative;overflow:hidden;
}
.btn-p::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,0);
  transition:background .15s;
}
.btn-p:hover{opacity:.9}
.btn-p:hover::after{background:rgba(255,255,255,.07)}
.btn-s{
  background:var(--surf);
  border:1px solid var(--brd2);
  color:var(--txt);
  padding:13px 20px;
}
.btn-s:hover{background:var(--surf2);border-color:rgba(230,225,255,.28)}
.btn-full{width:100%}

/* ── Section label ── */
.lbl{
  font-size:10.5px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(237,232,221,.35);
  margin-bottom:14px;margin-top:30px;
  display:flex;align-items:center;gap:10px;
  font-family:var(--fm);
}
.lbl::after{content:'';flex:1;height:1px;background:var(--brd)}

/* ── Stat cards ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.scard{
  background:var(--surf);
  border:1px solid var(--brd);
  border-radius:var(--rl);
  padding:16px 10px;
  text-align:center;
  transition:border-color .2s,transform .2s;
  position:relative;
  overflow:hidden;
}
.scard::before{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:2px;background:var(--red);
  transform:scaleX(0);transform-origin:left;
  transition:transform .3s;
}
.scard:hover{border-color:var(--brd2);transform:translateY(-2px)}
.scard:hover::before{transform:scaleX(1)}
.scard-n{
  font-family:var(--fd);font-size:34px;font-weight:800;
  color:var(--txt);line-height:1;margin-bottom:6px;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
.scard-l{
  font-size:9px;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;
  font-weight:600;font-family:var(--fm);
}

/* ── Progress bar ── */
.pbar{height:3px;background:var(--brd);border-radius:2px;overflow:hidden}
.pbar-f{height:100%;background:var(--red);border-radius:2px;transition:width .4s}

/* ── Hero ── */
.hero{padding:28px 0 16px}
.hero-title{
  font-family:var(--fd);
  font-size:38px;font-weight:800;
  line-height:1.05;letter-spacing:-1px;
  margin-bottom:12px;
  animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both;
}
.hero-title em{
  font-style:normal;
  color:var(--red);
  display:block;
  font-size:44px;
  animation:fadeUp .45s .05s cubic-bezier(.4,0,.2,1) both;
}
.hero-sub{
  font-size:12.5px;color:rgba(237,232,221,.4);
  font-family:var(--fm);
  letter-spacing:.5px;
}

/* ── Mot du jour ── */
.wod-card{
  background:var(--surf);
  border:1px solid var(--brd);
  border-left:3px solid var(--red);
  border-radius:var(--rl);
  padding:20px;
  margin-bottom:8px;
  position:relative;overflow:hidden;
  animation:fadeUp .5s .1s cubic-bezier(.4,0,.2,1) both;
}
.wod-label{
  font-size:9px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--red);margin-bottom:12px;
  font-family:var(--fm);
}
.wod-word{
  font-family:var(--fw);font-size:36px;
  font-weight:600;font-style:italic;line-height:1.1;
  margin-bottom:4px;
}
.wod-fr{font-size:14px;color:var(--muted);margin-bottom:10px;font-weight:400}
.wod-sent{font-size:12.5px;color:var(--muted);font-style:italic;line-height:1.7}

/* ── Badges ── */
.badge-toast{
  position:fixed;bottom:92px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#14120A;
  border-radius:var(--r-pill);
  padding:10px 20px;font-weight:700;font-size:13px;
  z-index:300;pointer-events:none;
  animation:badgeIn 3s ease forwards;
  white-space:nowrap;
  font-family:var(--fd);
}
@keyframes badgeIn{
  0%{opacity:0;transform:translateX(-50%) translateY(16px) scale(.9)}
  15%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  80%{opacity:1}
  100%{opacity:0;transform:translateX(-50%) translateY(-10px)}
}
.badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.badge-item{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--rl);padding:14px 8px;
  text-align:center;
  transition:border-color .2s,transform .18s;
}
.badge-item.earned{border-color:rgba(255,214,0,.35);background:rgba(255,214,0,.05);animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both}
.badge-item:hover{transform:translateY(-3px)}
.badge-icon{font-size:26px;margin-bottom:5px;opacity:.25;transition:opacity .2s}
.badge-item.earned .badge-icon{opacity:1}
.badge-name{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;font-family:var(--fm)}
.badge-item.earned .badge-name{color:var(--gold)}
.badge-desc{font-size:9px;color:var(--dim);margin-top:2px;line-height:1.4}

/* ── Favoris ── */
.fav-btn{background:none;border:none;font-size:15px;cursor:pointer;padding:2px;transition:transform .15s,opacity .15s;flex-shrink:0;opacity:.3}
.fav-btn.active{opacity:1;color:var(--gold)}
.fav-btn:hover{transform:scale(1.2);opacity:.7}

/* ── Word cards (vocab) ── */
.wcard{
  background:var(--surf);
  border:1px solid var(--brd);
  border-radius:var(--rl);
  padding:14px 16px;margin-bottom:8px;
  cursor:pointer;
  transition:border-color .2s,background .2s,transform .12s,box-shadow .2s;
  display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden;
}
.wcard::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:transparent;
  transition:background .2s;
  border-radius:0 2px 2px 0;
}
.wcard:hover{border-color:var(--brd2);background:var(--surf2);transform:translateX(2px)}
.wcard:hover::before{background:var(--red)}
.wcard:active{transform:scale(.99)}
.wcard.expanded{border-color:var(--brd2);background:var(--surf2)}
.wcard.expanded::before{background:var(--red)}
.wcard-pt{font-family:var(--fw);font-size:20px;font-weight:600;font-style:italic;margin-bottom:4px;letter-spacing:.1px;color:#fff}
.wcard-fr{font-size:13.5px;color:var(--muted);font-weight:400}
.wcard-phon{font-family:var(--fm);font-size:11.5px;color:var(--red);font-style:normal;margin-top:3px}
.wcard-expand{margin-top:12px;padding-top:12px;border-top:1px solid var(--brd)}
.exp-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:4px;font-weight:600;font-family:var(--fm)}
.exp-val{font-size:13px;color:var(--muted);line-height:1.7}
.exp-phon{font-family:var(--fm);font-size:13px;color:var(--red)}
.exp-trans{font-size:12px;color:var(--dim);font-style:italic;margin-top:4px}

/* ── XP popup ── */
.xp-pop{
  position:fixed;top:74px;right:18px;
  background:var(--gold);color:#14120A;
  border-radius:var(--r-pill);
  padding:6px 14px;font-weight:700;font-size:12px;
  z-index:200;pointer-events:none;
  animation:xpf 1.6s ease forwards;
  font-family:var(--fd);
}
@keyframes xpf{
  0%{opacity:0;transform:translateY(8px) scale(.85)}
  20%{opacity:1;transform:translateY(0) scale(1)}
  80%{opacity:1}
  100%{opacity:0;transform:translateY(-20px)}
}

/* ── Session / Exercise ── */
.ex-screen{padding-top:16px}
.ex-progress{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.ex-progress-bar{flex:1;height:3px;background:var(--brd);border-radius:2px;overflow:hidden}
.ex-progress-fill{height:100%;background:var(--red);border-radius:2px;transition:width .5s}
.ex-header{margin-bottom:20px;text-align:center}
.ex-type{font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.ex-question{font-family:var(--fw);font-size:28px;font-weight:600;font-style:italic;line-height:1.2}
.mc-grid{display:flex;flex-direction:column;gap:8px;margin:20px 0}
.mc-btn{
  background:var(--surf);border:1.5px solid var(--brd);
  border-radius:var(--rl);
  padding:14px 18px;
  color:var(--txt);font-size:14px;font-weight:500;
  text-align:left;cursor:pointer;
  transition:border-color .15s,background .15s;
}
.mc-btn:hover{background:var(--surf2);border-color:var(--brd2)}
.mc-btn.correct{
  border-color:var(--green);background:rgba(0,214,143,.12);color:var(--green);
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
}
.mc-btn.wrong{
  border-color:var(--red);background:rgba(255,41,82,.1);color:var(--red2);
  animation:shake .35s cubic-bezier(.36,.07,.19,.97);
}
.type-input{
  width:100%;background:var(--surf);
  border:2px solid var(--brd);border-radius:var(--rl);
  padding:14px 18px;
  font-size:18px;color:var(--txt);
  outline:none;
  font-family:var(--fd);font-weight:700;
  transition:border-color .2s,box-shadow .2s;
}
.type-input:focus{border-color:rgba(230,225,255,.3);box-shadow:0 0 0 3px rgba(230,225,255,.05)}
.type-input.ok{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,214,143,.08);animation:popIn .25s cubic-bezier(.34,1.56,.64,1)}
.type-input.ko{border-color:var(--red);box-shadow:0 0 0 3px rgba(255,41,82,.08);animation:shake .35s cubic-bezier(.36,.07,.19,.97)}
.type-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--r-pill);
  padding:4px 12px;font-size:11px;font-weight:600;
  color:var(--muted);margin-bottom:14px;
  font-family:var(--fm);letter-spacing:.5px;
}

/* ── Flashcard ── */
.flip-wrap{perspective:1000px;margin:16px 0}
.flip-card{
  width:100%;height:200px;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
  cursor:pointer;position:relative;border-radius:18px;
}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-card:hover:not(.flipped){transform:rotateY(8deg) scale(1.01)}
.flip-face{
  position:absolute;inset:0;
  border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  backface-visibility:hidden;padding:20px;
  border:1px solid var(--brd);
  background:var(--surf);
  box-shadow:0 4px 24px rgba(0,0,0,.25);
}
.flip-front{background:linear-gradient(145deg,var(--surf2),var(--surf))}
.flip-back{
  transform:rotateY(180deg);
  background:linear-gradient(145deg,rgba(255,41,82,.08),var(--surf));
  border-color:rgba(255,41,82,.2);
}
.flip-front .flip-hint{font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.flip-front .flip-word{font-family:var(--fw);font-size:38px;font-weight:600;font-style:italic;text-align:center}
.flip-back{transform:rotateY(180deg);background:var(--surf2)}
.flip-back .flip-fr{font-family:var(--fw);font-size:24px;font-weight:600;margin-bottom:8px}
.flip-back .flip-ph{font-family:var(--fm);font-size:14px;color:var(--red)}

/* ── Feedback box ── */
.fb-correct{
  background:rgba(0,214,143,.08);
  border:1px solid rgba(0,214,143,.3);
  border-radius:var(--rl);
  padding:14px 16px;margin-top:14px;
  animation:popIn .28s cubic-bezier(.34,1.56,.64,1);
}
.fb-wrong{
  background:rgba(255,41,82,.08);
  border:1px solid rgba(255,41,82,.28);
  border-radius:var(--rl);
  padding:14px 16px;margin-top:14px;
  animation:shake .35s cubic-bezier(.36,.07,.19,.97);
}

/* ── Listen exercise ── */
.listen-btn{
  display:flex;align-items:center;justify-content:center;
  width:96px;height:96px;border-radius:50%;
  background:var(--red);border:none;
  font-size:38px;cursor:pointer;
  margin:0 auto 16px;
  transition:transform .15s,opacity .15s,box-shadow .15s;
  box-shadow:0 0 0 0 rgba(255,41,82,.4);
  animation:listenPulse 2s ease-in-out infinite;
}
@keyframes listenPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,41,82,.4)}
  50%{box-shadow:0 0 0 14px rgba(255,41,82,.0)}
}
.listen-btn:hover{opacity:.88;transform:scale(1.07)}
.listen-btn:active{transform:scale(.94)}

/* ── Vocab tabs ── */
.vocab-tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none}
.vocab-tabs::-webkit-scrollbar{display:none}
.v-tab{
  padding:6px 14px;border-radius:var(--r-pill);
  font-size:12px;font-weight:600;white-space:nowrap;
  border:1px solid var(--brd);background:var(--surf);
  color:var(--muted);cursor:pointer;
  transition:all .15s;flex-shrink:0;
  font-family:var(--fb);
}
.v-tab:hover{border-color:var(--brd2);color:var(--txt)}
.v-tab.active{background:var(--red);border-color:var(--red);color:#fff}
.v-search{
  width:100%;background:var(--surf);
  border:1px solid var(--brd);border-radius:var(--rl);
  padding:12px 16px;font-size:14px;
  color:var(--txt);outline:none;
  transition:border-color .2s;margin-bottom:12px;
}
.v-search:focus{border-color:var(--brd2)}
.v-search::placeholder{color:var(--dim)}

/* ── Expressions ── */
.expr-cat{margin-bottom:24px}
.expr-cat-title{
  display:flex;align-items:center;gap:10px;
  font-family:var(--fd);font-size:16px;font-weight:700;
  margin-bottom:14px;padding-bottom:10px;
  border-bottom:1px solid var(--brd);
}
.expr-card{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--rl);padding:14px 16px;margin-bottom:8px;
  cursor:pointer;transition:border-color .15s,background .15s;
  position:relative;overflow:hidden;
}
.expr-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:transparent;transition:background .2s;
}
.expr-card:hover{border-color:var(--brd2);background:var(--surf2)}
.expr-card:hover::before,.expr-card.expanded::before{background:var(--red)}
.expr-card.expanded{border-color:var(--brd2);background:var(--surf2)}
.expr-pt{font-family:var(--fw);font-size:17px;font-weight:600;font-style:italic;margin-bottom:3px}
.expr-fr{font-size:13px;color:var(--muted)}
.expr-level{
  font-family:var(--fm);font-size:9px;letter-spacing:1px;
  text-transform:uppercase;color:var(--dim);margin-bottom:6px;
}
.expr-detail{margin-top:12px;padding-top:12px;border-top:1px solid var(--brd)}

/* ── Conjugaison ── */
.conj-verb-sel{display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none}
.conj-verb-sel::-webkit-scrollbar{display:none}
.conj-vbtn{
  padding:6px 14px;border-radius:var(--r-pill);
  font-size:12px;font-weight:600;white-space:nowrap;
  border:1px solid var(--brd);background:var(--surf);
  color:var(--muted);cursor:pointer;
  transition:all .15s;flex-shrink:0;
}
.conj-vbtn.active{background:var(--red);border-color:var(--red);color:#fff}
.conj-tense-tabs{
  display:flex;gap:4px;margin-bottom:16px;
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--r);padding:4px;
}
.conj-ttab{
  flex:1;padding:7px 8px;border-radius:calc(var(--r) - 2px);
  font-size:11.5px;font-weight:600;color:var(--muted);
  border:none;background:none;cursor:pointer;
  transition:all .15s;
}
.conj-ttab.active{background:var(--red);color:#fff}
.conj-table{width:100%;margin-bottom:16px}
.conj-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-radius:8px}
.conj-row:nth-child(odd){background:var(--surf)}
.conj-fr{font-size:12px;color:var(--muted);font-family:var(--fm);min-width:80px}
.conj-form{font-family:var(--fw);font-size:17px;font-weight:600;font-style:italic;flex:1;text-align:center}
.conj-pron{font-family:var(--fm);font-size:11px;color:var(--red);text-align:right}
.conj-play{
  width:28px;height:28px;border-radius:50%;
  background:var(--surf2);border:1px solid var(--brd);
  font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.conj-play:hover{background:var(--red);border-color:var(--red)}
.conj-tip{
  background:var(--surf);border:1px solid var(--brd);
  border-left:3px solid var(--red);
  border-radius:var(--rl);
  padding:14px 16px;margin-bottom:16px;font-size:13px;color:var(--muted);line-height:1.7;
}
.conj-ex-box{background:var(--surf2);border-radius:var(--r);padding:12px 14px;margin-top:8px}
.conj-ex-title{font-family:var(--fm);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.conj-ex-sent{font-size:13px;font-style:italic;color:var(--txt);line-height:1.6;margin-bottom:4px}
.conj-ex-trans{font-size:12px;color:var(--dim)}

/* ── Grammar ── */
.gram-section{margin-bottom:28px}
.gram-title{font-family:var(--fd);font-size:17px;font-weight:700;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--brd)}
.gram-rule{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);padding:14px 16px;margin-bottom:8px;font-size:13px;color:var(--muted);line-height:1.7}
.gram-rule strong{color:var(--txt)}

/* ── Dictionary ── */
.dict-search{
  width:100%;background:var(--surf);
  border:2px solid var(--brd);border-radius:var(--rl);
  padding:13px 16px;font-size:16px;
  color:var(--txt);outline:none;
  font-family:var(--fd);font-weight:600;
  transition:border-color .2s;margin-bottom:14px;
}
.dict-search:focus{border-color:rgba(230,225,255,.25)}
.dict-result{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);padding:16px;margin-bottom:8px}
.dict-word{font-family:var(--fw);font-size:24px;font-weight:600;font-style:italic;margin-bottom:6px}
.dict-pos{font-family:var(--fm);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);margin-bottom:8px}
.dict-def{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:8px}

/* ── Alphabet ── */
.alpha-wrap{padding-top:14px}
.alpha-tabs{display:flex;gap:6px;margin-bottom:16px;padding:4px;background:var(--surf);border-radius:var(--r);border:1px solid var(--brd)}
.alpha-tab{
  flex:1;padding:8px;border-radius:calc(var(--r) - 2px);
  font-size:12px;font-weight:600;color:var(--muted);
  border:none;background:none;cursor:pointer;
  transition:all .15s;
}
.alpha-tab.active{background:var(--red);color:#fff}
.alpha-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.alpha-card{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--rl);padding:14px 8px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;
}
.alpha-card:hover{border-color:var(--brd2);background:var(--surf2)}
.alpha-letter{font-family:var(--fd);font-size:24px;font-weight:800;margin-bottom:4px}
.alpha-sound{font-family:var(--fm);font-size:10px;color:var(--red);letter-spacing:.5px}
.alpha-example{font-size:10px;color:var(--dim);margin-top:2px}
.alpha-fr{font-size:10px;color:var(--muted)}
.alpha-section-title{font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--brd)}
.alpha-play{
  width:24px;height:24px;border-radius:50%;
  background:var(--surf2);border:1px solid var(--brd);
  font-size:11px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.alpha-play:hover{background:var(--red);border-color:var(--red)}
.alpha-tip{
  background:var(--surf);border:1px solid var(--brd);
  border-left:3px solid var(--red);
  border-radius:var(--rl);padding:12px 14px;margin-bottom:12px;
  font-size:12.5px;color:var(--muted);line-height:1.65;
}
.alpha-combo-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.alpha-combo-letters{font-family:var(--fd);font-size:20px;font-weight:800;margin-bottom:4px;color:var(--red)}
.alpha-combo-sound{font-family:var(--fm);font-size:11px;color:var(--muted);margin-bottom:4px}
.alpha-combo-body{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.alpha-combo-ex{font-size:12px;font-style:italic;color:var(--dim)}
.alpha-combo-fr{font-size:12px;color:var(--dim);margin-top:2px}
.alpha-combo-btn{
  padding:5px 12px;border-radius:var(--r-pill);
  font-size:11px;font-weight:600;
  background:var(--surf2);border:1px solid var(--brd);color:var(--muted);cursor:pointer;
  transition:all .15s;margin-top:6px;
}
.alpha-combo-btn:hover{background:var(--red);border-color:var(--red);color:#fff}

/* ── Stats screen ── */
.stat-big{font-family:var(--fd);font-size:52px;font-weight:800;line-height:1;margin-bottom:4px;color:var(--txt)}
.stat-label{font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

/* ── Chat ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100dvh - 120px);padding-top:0;position:relative}
.chat-top{display:flex;align-items:center;gap:12px;padding:12px 0 12px;border-bottom:1px solid var(--brd);flex-shrink:0}
.chat-avatar{
  width:42px;height:42px;border-radius:14px;
  background:linear-gradient(135deg,rgba(255,41,82,.2),rgba(255,41,82,.08));
  border:1px solid rgba(255,41,82,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.chat-contact-info{flex:1}
.chat-contact-name{font-family:var(--fd);font-size:16px;font-weight:700}
.chat-contact-status{
  font-size:11px;color:var(--green);font-weight:600;
  display:flex;align-items:center;gap:4px;font-family:var(--fm);
}
.chat-contact-status::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green)}
.chat-scenario-btn{
  background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);
  padding:6px 10px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;
  white-space:nowrap;transition:all .15s;
}
.chat-scenario-btn:hover{border-color:var(--brd2);color:var(--txt);background:var(--surf2)}
.chat-messages{flex:1;overflow-y:auto;padding:14px 0;display:flex;flex-direction:column;gap:10px;scrollbar-width:none}
.chat-messages::-webkit-scrollbar{display:none}
.msg{display:flex;flex-direction:column;max-width:82%}
.msg-me{align-self:flex-end;align-items:flex-end}
.msg-them{align-self:flex-start;align-items:flex-start}
.msg-bubble{
  padding:11px 15px;border-radius:18px;
  font-size:13.5px;line-height:1.65;
}
.msg-me .msg-bubble{
  background:var(--red);color:#fff;
  border-bottom-right-radius:5px;
  box-shadow:0 2px 12px rgba(255,41,82,.25);
}
.msg-them .msg-bubble{
  background:var(--surf2);color:var(--txt);
  border-bottom-left-radius:5px;
  border:1px solid var(--brd);
}
.msg-time{font-size:10px;color:var(--dim);margin-top:3px;font-family:var(--fm)}
.msg-translation{font-size:11.5px;color:var(--muted);margin-top:4px;font-style:italic;padding:6px 14px;background:var(--surf);border-radius:8px;line-height:1.5}
.msg-typing .msg-bubble{display:flex;gap:4px;align-items:center;height:38px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.chat-input-bar{display:flex;align-items:center;gap:8px;padding:10px 0 8px;flex-shrink:0;border-top:1px solid var(--brd)}
.chat-input{
  flex:1;background:var(--surf);
  border:1.5px solid var(--brd);border-radius:var(--r-pill);
  padding:11px 18px;font-size:14px;color:var(--txt);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.chat-input:focus{
  border-color:rgba(255,41,82,.35);
  box-shadow:0 0 0 3px rgba(255,41,82,.06);
}
.chat-input::placeholder{color:var(--dim)}
.chat-send{
  width:40px;height:40px;border-radius:50%;
  background:var(--red);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  transition:transform .15s,opacity .15s;
}
.chat-send:hover{opacity:.85}
.chat-send:active{transform:scale(.93)}
.chat-send:disabled{opacity:.3;cursor:default}
.chat-speak-btn{
  width:38px;height:38px;border-radius:12px;
  background:var(--surf);border:1px solid var(--brd);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  color:var(--muted);transition:all .15s;
}
.chat-speak-btn:hover{background:var(--surf2);border-color:var(--brd2);color:var(--txt)}

/* ── Scenarios ── */
.scenarios-sheet{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.scenarios-inner{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;padding:0 16px 32px;border-top:1px solid var(--brd);animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.scenarios-handle{width:32px;height:3px;border-radius:2px;background:var(--brd2);margin:12px auto 20px}

/* ── Chat scenario bottom sheet (interne au chat) ── */
.scenario-sheet{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:480px;
  background:var(--bg2);
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--brd2);
  z-index:200;
  max-height:75dvh;overflow-y:auto;
  padding:0 16px calc(20px + env(safe-area-inset-bottom));
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  scrollbar-width:none;
}
.scenario-sheet.open{transform:translateX(-50%) translateY(0)}
.scenario-handle{width:36px;height:4px;border-radius:2px;background:var(--brd2);margin:12px auto 16px}
.scenario-title{font-family:var(--fd);font-size:17px;font-weight:800;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--brd)}
.scenario-grid{display:flex;flex-direction:column;gap:4px}
.scenario-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:12px;
  cursor:pointer;transition:background .15s;
  border:1px solid transparent;
}
.scenario-item:hover{background:var(--surf)}
.scenario-item.selected{background:var(--surf);border-color:rgba(255,41,82,.25)}
.scenario-icon{font-size:20px;width:36px;text-align:center;flex-shrink:0}
.scenario-name{font-family:var(--fd);font-size:13px;font-weight:700;margin-bottom:1px}
.scenario-desc{font-size:11px;color:var(--muted)}
.scenario-overlay{
  position:fixed;inset:0;z-index:199;
  background:rgba(0,0,0,.5);
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.scenario-overlay.visible{opacity:1;pointer-events:all}
.scenario-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:var(--rl);
  cursor:pointer;transition:background .15s;
  border:1px solid transparent;
}
.scenario-item:hover{background:var(--surf)}
.scenario-item.selected{background:var(--surf);border-color:var(--brd2)}
.scenario-icon{font-size:22px;width:40px;text-align:center;flex-shrink:0}
.scenario-name{font-family:var(--fd);font-size:14px;font-weight:700;margin-bottom:2px}
.scenario-desc{font-size:11.5px;color:var(--muted)}

/* ── Videos ── */
.videos-wrap{padding-top:14px}
.videos-search-row{display:flex;gap:8px;margin-bottom:14px}
.videos-input{
  flex:1;background:var(--surf);
  border:1.5px solid var(--brd);border-radius:var(--rl);
  padding:11px 16px;font-size:14px;color:var(--txt);
  outline:none;transition:border-color .2s;
}
.videos-input:focus{border-color:rgba(230,225,255,.25)}
.videos-input::placeholder{color:var(--dim)}
.videos-search-btn{
  background:var(--red);border:none;border-radius:var(--rl);
  padding:11px 16px;color:#fff;font-size:16px;cursor:pointer;
  font-weight:700;transition:opacity .15s;flex-shrink:0;
}
.videos-search-btn:hover{opacity:.85}
.videos-search-btn:disabled{opacity:.3;cursor:default}
.videos-suggestions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.vid-chip{
  border:1px solid var(--brd);border-radius:var(--r-pill);
  padding:5px 12px;font-size:11.5px;font-weight:600;
  color:var(--muted);background:var(--surf);cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.vid-chip:hover{border-color:var(--red);color:var(--red);background:rgba(255,41,82,.06)}
.vid-card{
  display:flex;gap:12px;
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--rl);padding:12px;margin-bottom:8px;
  cursor:pointer;transition:border-color .15s,background .15s;
  text-decoration:none;color:inherit;
}
.vid-card:hover{border-color:var(--brd2);background:var(--surf2)}
.vid-thumb{width:96px;height:58px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surf2)}
.vid-thumb-placeholder{width:96px;height:58px;border-radius:8px;flex-shrink:0;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:22px}
.vid-info{flex:1;min-width:0}
.vid-title{font-weight:600;font-size:13px;line-height:1.4;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vid-channel{font-size:11px;color:var(--muted);margin-bottom:2px}
.vid-meta{display:flex;gap:8px;font-size:10px;color:var(--dim)}
.vid-duration{background:rgba(0,0,0,.5);color:#fff;border-radius:4px;padding:1px 5px;font-size:9px;font-weight:700}
.videos-spinner{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);font-size:13px}
.videos-spinner::before{content:'';width:20px;height:20px;border:2px solid var(--brd);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.videos-empty{text-align:center;padding:40px 20px;color:var(--muted)}
.videos-empty-icon{font-size:44px;margin-bottom:12px}
.videos-error{background:rgba(255,41,82,.06);border:1px solid rgba(255,41,82,.2);border-radius:var(--r);padding:12px 16px;color:var(--red2);font-size:13px;margin-bottom:14px}

/* ── Category cards ── */
.cats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px}
.cat-card{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--rl);padding:14px;cursor:pointer;
  transition:border-color .15s,background .15s;
  position:relative;overflow:hidden;
}
.cat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--cc,var(--red));
}
.cat-card:hover{border-color:var(--brd2);background:var(--surf2)}
.cat-icon{font-size:22px;margin-bottom:6px}
.cat-name{font-family:var(--fd);font-size:13px;font-weight:700;margin-bottom:2px}
.cat-count{font-size:11px;color:var(--muted)}
.cat-bar{height:2px;background:var(--brd);border-radius:1px;margin-top:8px;overflow:hidden}
.cat-bar-f{height:100%;border-radius:1px;transition:width .4s}

/* ── Freeze card ── */
.freeze-card{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--rl);
  padding:14px 16px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;
}
.freeze-active{border-color:rgba(94,196,255,.3);background:rgba(94,196,255,.05)}
.freeze-icon{font-size:22px;flex-shrink:0}
.freeze-info{flex:1}
.freeze-title{font-family:var(--fd);font-size:14px;font-weight:700;margin-bottom:2px}
.freeze-sub{font-size:11px;color:var(--muted);line-height:1.5}
.freeze-btn{
  background:var(--surf2);border:1px solid var(--brd2);
  border-radius:var(--r);padding:7px 12px;
  font-size:12px;font-weight:600;color:var(--txt);cursor:pointer;
  flex-shrink:0;transition:all .15s;white-space:nowrap;
}
.freeze-btn:hover:not(:disabled){background:var(--blue);border-color:var(--blue);color:#fff}
.freeze-btn:disabled{opacity:.35;cursor:default}

/* ── Science box ── */
.sci-box{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--rl);padding:16px;margin-bottom:16px;
}
.sci-title{font-family:var(--fd);font-size:14px;font-weight:700;margin-bottom:12px;color:var(--txt)}
.sci-item{display:flex;gap:10px;margin-bottom:8px}
.sci-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:5px}
.sci-text{font-size:12.5px;color:var(--muted);line-height:1.65}

/* ── Brazil Map ── */
.map-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.map-sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;padding:0 16px 32px;border-top:1px solid var(--brd);animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
.map-handle{width:32px;height:3px;border-radius:2px;background:var(--brd2);margin:12px auto 20px}
.map-svg-wrap{position:relative;margin-bottom:20px}
.map-region{cursor:pointer;transition:opacity .2s}
.map-region:hover{opacity:.8}
.map-region.active{filter:brightness(1.3)}
.region-info{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);padding:16px 18px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.region-info-title{font-family:var(--fd);font-size:18px;font-weight:800;margin-bottom:4px}
.region-info-sub{font-size:12px;color:var(--muted);margin-bottom:14px}

/* ── Theme: Carnaval ── */
body.carnaval{--bg:#0D0618;--bg2:#130924;--surf:#1A1228;--surf2:#221633;--red:#CC00FF;--red2:#E066FF;--green:#00FFB0;--gold:#FFB800}

/* ── Animations & Transitions ── */
@keyframes spin{to{transform:rotate(360deg)}}

/* Screen transitions */
@keyframes slideInRight{
  from{opacity:0;transform:translateX(28px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes slideInLeft{
  from{opacity:0;transform:translateX(-28px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0}to{opacity:1}
}
@keyframes popIn{
  0%{opacity:0;transform:scale(.92)}
  60%{transform:scale(1.02)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.08)}
}
@keyframes correctFlash{
  0%{background:rgba(0,214,143,.0)}
  30%{background:rgba(0,214,143,.18)}
  100%{background:rgba(0,214,143,.0)}
}
@keyframes staggerIn{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}

.au{animation:fadeUp .28s cubic-bezier(.4,0,.2,1)}
.slide-in-right{animation:slideInRight .3s cubic-bezier(.4,0,.2,1)}
.slide-in-left{animation:slideInLeft .3s cubic-bezier(.4,0,.2,1)}
.pop-in{animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97)}

/* Staggered children — apply to parent */
.stagger > *{
  opacity:0;
  animation:staggerIn .35s cubic-bezier(.4,0,.2,1) forwards;
}
.stagger > *:nth-child(1){animation-delay:.03s}
.stagger > *:nth-child(2){animation-delay:.07s}
.stagger > *:nth-child(3){animation-delay:.11s}
.stagger > *:nth-child(4){animation-delay:.15s}
.stagger > *:nth-child(5){animation-delay:.19s}
.stagger > *:nth-child(6){animation-delay:.23s}
.stagger > *:nth-child(7){animation-delay:.27s}
.stagger > *:nth-child(8){animation-delay:.31s}
.stagger > *:nth-child(9){animation-delay:.35s}
.stagger > *:nth-child(10){animation-delay:.39s}
.stagger > *:nth-child(11){animation-delay:.43s}
.stagger > *:nth-child(12){animation-delay:.47s}

/* Ripple on tap */
.ripple{position:relative;overflow:hidden}
.ripple::after{
  content:'';position:absolute;
  border-radius:50%;background:rgba(255,255,255,.15);
  transform:scale(0);animation:rippleAnim .5s linear;
  pointer-events:none;
}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}

/* ── Theme toggle ── */
.theme-toggle{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:var(--r-pill);padding:5px 10px;font-size:14px;
  cursor:pointer;transition:background .2s;color:var(--txt);
}
.theme-toggle:hover{background:var(--surf2);border-color:var(--brd2)}


/* ── Home Grid ── */
.home-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:8px;margin:18px 0;
}
.home-tile{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:16px 4px 13px;
  background:var(--surf);border:1px solid var(--brd);
  border-radius:16px;cursor:pointer;
  transition:background .15s,border-color .15s,transform .12s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.home-tile::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:rgba(255,255,255,0);
  transition:background .15s;
}
.home-tile:hover{background:var(--surf2);border-color:var(--brd2);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.25)}
.home-tile:active{transform:scale(.93)}
.home-tile-accent{border-color:rgba(255,41,82,.22);background:rgba(255,41,82,.05)}
.home-tile-accent:hover{background:rgba(255,41,82,.1);border-color:rgba(255,41,82,.38);box-shadow:0 8px 20px rgba(255,41,82,.15)}
.home-tile-game{border-color:rgba(0,214,143,.22);background:rgba(0,214,143,.05)}
.home-tile-game:hover{background:rgba(0,214,143,.1);border-color:rgba(0,214,143,.38);box-shadow:0 8px 20px rgba(0,214,143,.15)}
.ht-ico{font-size:24px;line-height:1;transition:transform .2s}
.home-tile:hover .ht-ico{transform:scale(1.15) translateY(-1px)}
.ht-lbl{font-size:9.5px;font-weight:600;color:var(--muted);letter-spacing:.2px;text-align:center;line-height:1.3;transition:color .15s}
.home-tile:hover .ht-lbl{color:var(--txt)}

/* ── Responsive ── */
@media (max-width:380px){
  .hero-title{font-size:28px}
  .wod-word{font-size:26px}
}
</style>

function sm2(card={},q){
  let{ease=2.5,interval=1,reps=0}=card;
  if(q<1){reps=0;interval=1;}
  else{
    if(reps===0)interval=1;
    else if(reps===1)interval=6;
    else interval=Math.round(interval*ease);
    reps++;
  }
  ease=Math.max(1.3,ease+0.1-(3-q)*(0.08+(3-q)*0.02));
  return{ease,interval,reps,nextReview:Date.now()+interval*86400000,lastQ:q};
}

  const now=Date.now();

}

  if(!c||c.reps===0)return 0;
  const i=c.interval;
  if(i>=30)return 5;if(i>=15)return 4;if(i>=7)return 3;if(i>=3)return 2;return 1;
}

function updateStreak(){
  const today=todayStr();
  if(meta.lastDate===today)return;
  const yest=new Date(Date.now()-86400000).toISOString().split("T")[0];
  const dayBefore=new Date(Date.now()-2*86400000).toISOString().split("T")[0];

  if(meta.lastDate===yest){
    // consecutive day
    meta.streak=(meta.streak||0)+1;
  } else if(meta.lastDate===dayBefore && (meta.streakFreezes||0)>0 && meta.freezeUsedDate!==yest){
    // missed yesterday but have a freeze available — auto-protect
    meta.streakFreezes=(meta.streakFreezes||1)-1;
    meta.freezeUsedDate=yest;
    meta.streak=(meta.streak||0)+1;
    setTimeout(()=>showBadgeToast({icon:"🧊",name:"Freeze utilisé !",desc:"Ta série a été protégée !"}),600);
  } else if(meta.lastDate!==today){
    // streak broken
    meta.streak=1;
  }

  meta.lastDate=today;
  meta.sessionsTotal=(meta.sessionsTotal||0)+1;

  // Award a freeze every 7 days of streak
  if(meta.streak>0 && meta.streak%7===0 && (meta.streakFreezes||0)<3){
    meta.streakFreezes=(meta.streakFreezes||0)+1;
    setTimeout(()=>showBadgeToast({icon:"🧊",name:"Freeze gagné !",desc:`${meta.streakFreezes} protection${meta.streakFreezes>1?"s":""} disponible${meta.streakFreezes>1?"s":""}`}),1000);
  }
}

}

function startSession(catKey){
  const due=getDue();
  let pool;
  if(catKey){
    const catDue=due.filter(w=>VOCAB[catKey].words.some(cw=>cw.id===w.id));
    pool=catDue.length>0?catDue:[...VOCAB[catKey].words].sort(()=>Math.random()-.5);
  } else {
    pool=due.length>0?due:[...ALL_WORDS].sort(()=>Math.random()-.5);
  }
  queue=pool.slice(0,10);
  retryQueue=[];
  qIdx=0;sesDone=false;sesStats={c:0,t:0};
  exercise=mkExercise(queue[0]);
  screen="session";render();
}

function getCatWords(word){
  // Find the category this word belongs to
  for(const cat of Object.values(VOCAB)){
    if(cat.words.some(w=>w.id===word.id)) return cat.words;
  }
  return ALL_WORDS;
}

function mkExercise(word){
  const types=["flashcard","mc","mc_reverse","typing","context","listen"];
  const type=types[Math.floor(Math.random()*types.length)];
  const catWords=getCatWords(word);

  // Smart distractors: prefer same category, fallback to all words
  function getDistractors(mapFn,correctVal,count=3){
    const sameCat=catWords.filter(w=>w.id!==word.id&&mapFn(w)!==correctVal);
    const pool=sameCat.length>=count
      ? sameCat.sort(()=>Math.random()-.5).slice(0,count)
      : [
          ...sameCat,
          ...ALL_WORDS.filter(w=>w.id!==word.id&&!catWords.includes(w)&&mapFn(w)!==correctVal)
            .sort(()=>Math.random()-.5)
            .slice(0,count-sameCat.length)
        ];
    return pool.map(mapFn);
  }

  if(type==="mc"){
    // Show PT → choose FR translation
    const distractors=getDistractors(w=>w.fr,word.fr);
    return{type,word,options:[word.fr,...distractors].sort(()=>Math.random()-.5),direction:"pt_to_fr"};
  }
  if(type==="mc_reverse"){
    // Show FR → choose PT word  ← NEW
    const distractors=getDistractors(w=>w.pt,word.pt);
    return{type:"mc",word,options:[word.pt,...distractors].sort(()=>Math.random()-.5),direction:"fr_to_pt"};
  }
  if(type==="context"){
    // Complete PT sentence → options in PT
    const distractors=getDistractors(w=>w.pt,word.pt);
    return{type,word,options:[word.pt,...distractors].sort(()=>Math.random()-.5)};
  }
  return{type,word};
}

function rate(q){
  const word=queue[qIdx];
  const upd=sm2(cards[word.id],q);
  cards[word.id]=upd;
  const xpGain=[0,5,10,15][q]||0;
  const ok=q>=1;
  updateStreak();
  meta.xp=(meta.xp||0)+xpGain;
  meta.wordsReviewed=(meta.wordsReviewed||0)+1;
  meta.correctAnswers=(meta.correctAnswers||0)+(ok?1:0);
  sesStats={c:sesStats.c+(ok?1:0),t:sesStats.t+1};
  save();
  if(xpGain>0)showXP(xpGain);
  checkBadges();

  // Si raté et pas déjà dans la file de rattrapage → on l'ajoute
  if(!ok && !retryQueue.some(w=>w.id===word.id)){
    retryQueue.push(word);
  }

  const next=qIdx+1;
  if(next>=queue.length){
    // File principale terminée — on enchaîne avec les ratés (une seule passe)
    if(retryQueue.length>0){
      queue=[...retryQueue];
      retryQueue=[];
      qIdx=0;
      exercise=mkExercise(queue[0]);
      render();
    } else {
      sesDone=true;render();
    }
  } else {
    qIdx=next;exercise=mkExercise(queue[qIdx]);render();
  }
}

════════════════════════════════════════ */
// Annotate each syllable of a ph string with color-coded sound hints
// ph format like "ka-BE-sa" or "o-bri-GA-do"
function phonoBadge(ph, ptWord){
  if(!ph) return "";
  // Color rules matching the alphabet guide
  const rules=[
    {re:/\bNH\b/gi,      color:"#9B59B6", tip:"NH = gn (comme campagne)"},
    {re:/\bLH\b/gi,      color:"#9B59B6", tip:"LH = ly (comme fille)"},
    {re:/\bCH\b/gi,      color:"#9B59B6", tip:"CH = ch (comme chat)"},
    {re:/\bTCH\b/gi,     color:"#E74C3C", tip:"T+i = tch (comme tchao)"},
    {re:/\bDJI?\b/gi,    color:"#E74C3C", tip:"D+i = dj (comme Djakarta)"},
    {re:/ANG|ONG|ING/gi, color:"#D4522A", tip:"Son nasal"},
    {re:/\bH[A-Z]/gi,    color:"#E8A838", tip:"R brésilien = H aspiré"},
    {re:/[A-Z]{2,}/g,    color:"var(--gold)", tip:"Syllabe accentuée"},
  ];
  // Split by hyphens and spaces, annotate each part
  const parts=ph.split(/([-\s])/);
  return parts.map(part=>{
    if(part==="-"||part===" ") return `<span style="color:var(--dim)">${part}</span>`;
    // Check if uppercase (stressed)
    const isStressed=part===part.toUpperCase()&&/[A-Z]/.test(part);
    // Check for special sounds
    let color="var(--muted)";
    let matched=false;
    for(const rule of rules){
      if(rule.re.test(part)){color=rule.color;matched=true;break;}
      rule.re.lastIndex=0;
    }
    if(!matched&&isStressed) color="var(--gold)";
    return `<span style="color:${color};font-weight:${isStressed?"700":"500"}">${part}</span>`;
  }).join("");
}

// Full phonetic line with audio button and colored breakdown

  const retryBadge=isRetry?`<span style="font-size:10px;font-weight:700;color:#FF7A5A;background:rgba(212,82,42,.15);border:1px solid rgba(212,82,42,.3);border-radius:10px;padding:2px 8px;margin-left:8px">🔁 Rattrapage</span>`:"";

function renderExercise(){
  const {type}=exercise;
  if(type==="flashcard") return renderFlashcard();
  if(type==="mc")        return renderMC();
  if(type==="typing")    return renderTyping();
  if(type==="context")   return renderContext();
  if(type==="listen")    return renderListen();
  return div("");
}

function speak(text,rate=0.85){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="pt-BR";u.rate=rate;u.pitch=1;
  // prefer a PT voice if available
  const voices=window.speechSynthesis.getVoices();
  const ptVoice=voices.find(v=>v.lang.startsWith("pt"));
  if(ptVoice)u.voice=ptVoice;
  window.speechSynthesis.speak(u);
}
function speakSlow(text){speak(text,0.55);}

function audioBtn(text,small=false){
  const btn=document.createElement("button");
  btn.innerHTML=`🔊`;
  btn.title="Écouter la prononciation";

  btn.addEventListener("click",e=>{e.stopPropagation();speak(text);btn.style.transform="scale(.88)";setTimeout(()=>btn.style.transform="",200);});
  return btn;
}

function renderMC(){
  const {word,options,direction}=exercise;
  const isFrToPt=direction==="fr_to_pt";

  const wrap=div("au");
  wrap.innerHTML=`
    <div class="type-badge">${isFrToPt?"🔄 Français → Portugais":"❓ Choix multiple"}</div>
    <div class="ex-card">
      ${isFrToPt
        ? `<div style="font-size:13px;color:var(--muted);margin-bottom:10px">Quelle est la traduction en portugais ?</div>
           <div class="ex-fr">${word.fr}</div>`
        : `<div class="ex-word">${word.pt}</div>
           <div id="mc-phono" style="margin:4px 0 6px"></div>
           <div class="ex-sent" style="margin-top:6px;font-size:13px">${word.s}</div>`
      }
    </div>
    <div class="mc-opts"></div>`;

  // inject colored phonoLine for PT→FR mode
  if(!isFrToPt){
    const slot=wrap.querySelector("#mc-phono");
    if(slot) slot.innerHTML=phonoLine(word,"12px");
  }

  // After answering FR→PT: show phonetics of the correct PT word
  const optsDiv=wrap.querySelector(".mc-opts");
  options.forEach(opt=>{
    const btn=document.createElement("button");

      optsDiv.querySelectorAll(".mc-opt").forEach(b=>{
        b.disabled=true;
        if(b.textContent===correctAnswer)b.classList.add("mc-correct");
        else if(b===btn&&opt!==correctAnswer)b.classList.add("mc-wrong");

      speak(word.pt);

      if(isFrToPt){

        optsDiv.after(reveal);
      }
      setTimeout(()=>rate(opt===correctAnswer?2:0),1400);
    });
    optsDiv.appendChild(btn);

function renderTyping(){
  const {word}=exercise;
  const wrap=div("au");
  wrap.innerHTML=`
    <div class="type-badge">✏️ Production active</div>
    <div class="ex-card" style="min-height:140px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Traduisez en français :</div>
      <div style="font-family:var(--fd);font-size:20px;line-height:1.6">${word.s}</div>
      <div style="font-size:12px;color:var(--dim);margin-top:8px">Mot clé : <span style="color:var(--gold);font-weight:600">${word.pt}</span></div>
      <div id="typing-phono" style="margin-top:8px"></div>
    </div>`;
  wrap.querySelector("#typing-phono").innerHTML=phonoLine(word,"12px");
  const inp=document.createElement("input");
  inp.className="t-input";inp.placeholder=`Traduction de « ${word.pt} »…`;

  // ── Special PT keyboard ──
  const kb=document.createElement("div");
  kb.className="pt-keyboard";
  kb.innerHTML=`<div class="pt-kb-label">Caractères spéciaux portugais</div>`;
  const ptChars=["ã","â","á","à","ç","é","ê","í","ó","ô","õ","ú","ü","ñ"];
  ptChars.forEach(ch=>{
    const k=document.createElement("button");
    k.className="pt-key";k.textContent=ch;k.type="button";
    k.addEventListener("click",e=>{
      e.preventDefault();
      const pos=inp.selectionStart||inp.value.length;
      inp.value=inp.value.slice(0,pos)+ch+inp.value.slice(inp.selectionEnd||pos);
      inp.selectionStart=inp.selectionEnd=pos+1;
      inp.focus();
      checkBtn.style.display=inp.value.trim()?"block":"none";
    });
    kb.appendChild(k);
  });

  const fb=div("t-fb","");fb.style.display="none";
  const checkBtn=document.createElement("button");
  checkBtn.className="btn btn-p btn-full";checkBtn.textContent="Vérifier →";checkBtn.style.display="none";
  function norm(s){return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g,"");}
  function check(){
    if(inp.disabled)return;
    const ok=norm(inp.value)===norm(word.fr)||norm(inp.value)===norm(word.pt);
    inp.disabled=true;checkBtn.style.display="none";
    kb.style.display="none";
    inp.classList.add(ok?"t-correct":"t-wrong");
    fb.style.display="block";
    fb.className="t-fb "+(ok?"t-fb-ok":"t-fb-no");
    fb.innerHTML=ok?"✓ Parfait !":`✗ Réponse : <strong>${word.fr}</strong>`;
    speak(word.pt);
    setTimeout(()=>rate(ok?2:0),1300);
  }
  inp.addEventListener("input",()=>{checkBtn.style.display=inp.value.trim()?"block":"none";});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")check();});
  checkBtn.addEventListener("click",check);
  wrap.appendChild(inp);wrap.appendChild(kb);wrap.appendChild(fb);wrap.appendChild(checkBtn);
  setTimeout(()=>inp.focus(),100);
  return wrap;
}

      optsDiv.after(reveal);
      setTimeout(()=>rate(opt===correct?2:0),1400);
    });
    optsDiv.appendChild(btn);
  });
  return wrap;
}

function renderListen(){
  const {word,options}=exercise;
  const correctAnswer=word.fr;
  const wrap=div("au");

  // Build distractors like MC
  const getCatWords2=w=>{for(const cat of Object.values(VOCAB)){if(cat.words.some(x=>x.id===w.id))return cat.words;}return ALL_WORDS;};
  const catWords=getCatWords2(word);
  const distractors=[...catWords.filter(w=>w.id!==word.id),
    ...ALL_WORDS.filter(w=>w.id!==word.id&&!catWords.includes(w))]
    .sort(()=>Math.random()-.5).slice(0,3).map(w=>w.fr);
  const allOpts=[correctAnswer,...distractors].sort(()=>Math.random()-.5);

  wrap.innerHTML=`
    <div class="type-badge">🎧 Mode Écoute</div>
    <div class="ex-card" style="min-height:200px;cursor:default">
      <div style="font-size:13px;color:var(--muted);margin-bottom:18px">Écoute le mot et trouve sa traduction en français</div>
      <button class="listen-btn" id="listen-play-btn">🔊</button>
      <div style="font-size:12px;color:var(--dim)">Appuie pour écouter</div>
    </div>
    <div class="mc-opts" id="listen-opts" style="opacity:.4;pointer-events:none"></div>`;

  const playBtn=wrap.querySelector("#listen-play-btn");
  const optsDiv=wrap.querySelector("#listen-opts");
  let played=false;

  function playWord(){
    playBtn.classList.add("pulsing");
    speak(word.pt);
    setTimeout(()=>playBtn.classList.remove("pulsing"),2000);
    if(!played){
      played=true;
      optsDiv.style.opacity="1";
      optsDiv.style.pointerEvents="auto";
    }
  }
  playBtn.addEventListener("click",playWord);
  // Auto-play after short delay
  setTimeout(playWord,500);

  allOpts.forEach(opt=>{
    const btn=document.createElement("button");
    btn.className="mc-opt";btn.textContent=opt;
    btn.addEventListener("click",()=>{
      if(btn.disabled)return;
      optsDiv.querySelectorAll(".mc-opt").forEach(b=>{
        b.disabled=true;
        if(b.textContent===correctAnswer)b.classList.add("mc-correct");
        else if(b===btn&&opt!==correctAnswer)b.classList.add("mc-wrong");
      });
      const ok=opt===correctAnswer;
      // Reveal the word text
      const reveal=document.createElement("div");
      reveal.style.cssText="margin-top:12px;padding:10px 14px;background:rgba(232,168,56,.06);border:1px solid rgba(232,168,56,.15);border-radius:var(--r);text-align:center";
      reveal.innerHTML=`<div style="font-family:var(--fd);font-size:22px;font-weight:900;margin-bottom:4px">${word.pt}</div>${phonoLine(word,"12px")}`;
      optsDiv.after(reveal);
      setTimeout(()=>rate(ok?2:0),1400);
    });
    optsDiv.appendChild(btn);
  });
  return wrap;
}

function renderVocab(){
  const wrap=div("au");
  wrap.style.paddingTop="16px";
  wrap.innerHTML=`<h2 style="font-family:var(--fd);font-size:24px;font-weight:900;margin-bottom:14px">Vocabulaire</h2>

  const search=wrap.querySelector("#vsearch");
  search.addEventListener("input",e=>{vocabSearch=e.target.value;expandedWord=null;refreshVocab(wrap);});

  const tabs=wrap.querySelector("#vtabs");

  // Favorites tab
  const favBtn=document.createElement("button");
  favBtn.className="v-tab";
  favBtn.textContent=`⭐ Favoris (${favorites.size})`;
  favBtn.style.background=vocabCat==="__favs__"&&!vocabSearch?"#E8A838":"rgba(240,235,224,.07)";
  favBtn.style.color=vocabCat==="__favs__"&&!vocabSearch?"#0F1A14":"rgba(240,235,224,.6)";
  favBtn.addEventListener("click",()=>{vocabCat="__favs__";vocabSearch="";expandedWord=null;search.value="";refreshVocab(wrap);renderVocab_tabs(wrap);});
  tabs.appendChild(favBtn);
  Object.entries(VOCAB).forEach(([key,cat])=>{
    const btn=document.createElement("button");
    btn.className="v-tab";
    btn.textContent=`${cat.icon} ${cat.label}`;
    btn.style.background=vocabCat===key&&!vocabSearch?cat.color:"rgba(240,235,224,.07)";
    btn.style.color=vocabCat===key&&!vocabSearch?"#0F1A14":"rgba(240,235,224,.6)";
    btn.addEventListener("click",()=>{vocabCat=key;vocabSearch="";expandedWord=null;search.value="";renderVocab_refresh(wrap);renderVocab_tabs(wrap);});
    tabs.appendChild(btn);
  });
  refreshVocab(wrap);
  return wrap;
}
function renderVocab_tabs(wrap){
  const tabs=wrap.querySelector("#vtabs");
  tabs.querySelectorAll(".v-tab").forEach((btn,i)=>{
    if(i===0){
      // favorites tab
      btn.textContent=`⭐ Favoris (${favorites.size})`;
      btn.style.background=vocabCat==="__favs__"&&!vocabSearch?"#E8A838":"rgba(240,235,224,.07)";
      btn.style.color=vocabCat==="__favs__"&&!vocabSearch?"#0F1A14":"rgba(240,235,224,.6)";
      return;
    }
    const key=Object.keys(VOCAB)[i-1];
    const cat=VOCAB[key];
    btn.style.background=vocabCat===key&&!vocabSearch?cat.color:"rgba(240,235,224,.07)";
    btn.style.color=vocabCat===key&&!vocabSearch?"#0F1A14":"rgba(240,235,224,.6)";
  });
}
function refreshVocab(wrap){
  const searching=vocabSearch.trim().length>0;
  let words;
  if(searching){
    words=ALL_WORDS.filter(w=>w.pt.toLowerCase().includes(vocabSearch.toLowerCase())||w.fr.toLowerCase().includes(vocabSearch.toLowerCase()));
  } else if(vocabCat==="__favs__"){
    words=ALL_WORDS.filter(w=>favorites.has(w.id));
  } else {
    words=VOCAB[vocabCat].words;
  }
  const container=wrap.querySelector("#vwords");
  container.innerHTML="";

/* ── EXPRESSIONS ── */
let exprSearch="",exprOpen=null;
function renderExpr(){
  const wrap=div("au");
  wrap.style.paddingTop="16px";
  wrap.innerHTML=`
    <h2 style="font-family:var(--fd);font-size:24px;font-weight:900;margin-bottom:4px">🗣️ Expressions</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Gírias, proverbes & expressions typiquement brésiliennes</p>
    <input class="expr-search" id="expr-q" placeholder="🔍 Chercher une expression…" value="${exprSearch}"/>
    <div id="expr-content"></div>`;

  const searchInp=wrap.querySelector("#expr-q");
  searchInp.addEventListener("input",e=>{exprSearch=e.target.value;exprOpen=null;refreshExpr(wrap);});

  refreshExpr(wrap);
  return wrap;
}

function refreshExpr(wrap){
  const cont=wrap.querySelector("#expr-content");
  cont.innerHTML="";
  const q=exprSearch.trim().toLowerCase();

  EXPRESSIONS.forEach(cat=>{
    const items=q?cat.items.filter(i=>i.expr.toLowerCase().includes(q)||i.fr.toLowerCase().includes(q)||i.context.toLowerCase().includes(q)):cat.items;
    if(!items.length)return;

    const sec=document.createElement("div");
    sec.className="expr-cat";
    const title=document.createElement("div");
    title.className="expr-cat-title";
    title.style.color=cat.color;
    title.innerHTML=`<span style="font-size:22px">${cat.icon}</span><span>${cat.cat}</span><span style="font-size:12px;color:var(--muted);margin-left:auto;font-weight:500">${items.length} expressions</span>`;
    sec.appendChild(title);

    items.forEach(item=>{
      const card=document.createElement("div");
      card.className="expr-card"+(exprOpen===item.expr?" open":"");
      card.style.setProperty("--ec",cat.color);
      const lvlClass=item.level==="arg"?"expr-lvl-arg":item.level==="fam"?"expr-lvl-fam":"expr-lvl-std";
      const lvlLabel=item.level==="arg"?"argot":item.level==="fam"?"familier":"standard";
      const isOpen=exprOpen===item.expr;
      card.innerHTML=`
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div style="flex:1">
            <div class="expr-pt">${item.expr}<span class="expr-level ${lvlClass}">${lvlLabel}</span></div>
            <div class="expr-fr">${item.fr}</div>
          </div>
          <button onclick="event.stopPropagation();speak('${item.expr.replace(/['"]/g," ")}')" style="background:rgba(232,168,56,.12);border:1px solid rgba(232,168,56,.22);border-radius:50%;width:30px;height:30px;font-size:13px;cursor:pointer;flex-shrink:0;margin-top:4px">🔊</button>
        </div>
        ${isOpen?`<div class="expr-body au">
          <div class="expr-context">💡 ${item.context}</div>
          <div class="expr-example">🇧🇷 ${item.ex}</div>
          <div class="expr-example-trans">🇫🇷 ${item.ext}</div>
        </div>`:""}`;
      card.addEventListener("click",()=>{exprOpen=exprOpen===item.expr?null:item.expr;refreshExpr(wrap);});
      sec.appendChild(card);
    });
    cont.appendChild(sec);
  });

  if(q&&cont.childElementCount===0){
    cont.innerHTML=`<div style="text-align:center;padding:48px 24px;color:var(--muted)"><div style="font-size:40px;margin-bottom:12px">🔍</div><div style="font-size:14px">Aucune expression trouvée pour "<strong>${q}</strong>"</div></div>`;
  }
}

/* ── CONJUGAISON ── */
let conjVerbIdx=0,conjTense="presente";
function renderConj(){
  const wrap=div("au");
  wrap.style.paddingTop="16px";
  wrap.innerHTML=`
    <h2 style="font-family:var(--fd);font-size:24px;font-weight:900;margin-bottom:4px">📝 Conjugaison</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px">${VERBS_CONJ.length} verbes essentiels · Présent · Passé · Futur</p>
    <div class="conj-verb-sel" id="conj-vsel"></div>
    <div class="conj-tense-tabs" id="conj-ttabs"></div>
    <div id="conj-body"></div>`;

  const vsel=wrap.querySelector("#conj-vsel");
  VERBS_CONJ.forEach((v,i)=>{
    const btn=document.createElement("button");
    btn.className="conj-vbtn"+(i===conjVerbIdx?" active":"");
    btn.textContent=v.inf;
    btn.addEventListener("click",()=>{conjVerbIdx=i;refreshConj(wrap);scrollVerbBtn(vsel,btn);});
    vsel.appendChild(btn);
  });

  const ttabs=wrap.querySelector("#conj-ttabs");
  ["presente","passado","futuro"].forEach(t=>{
    const labels={"presente":"Présent","passado":"Passé","futuro":"Futur"};
    const btn=document.createElement("button");
    btn.className="conj-ttab"+(conjTense===t?" active":"");
    btn.textContent=labels[t];
    btn.addEventListener("click",()=>{conjTense=t;refreshConj(wrap);});
    ttabs.appendChild(btn);
  });

  refreshConj(wrap);
  return wrap;
}

function scrollVerbBtn(sel,btn){setTimeout(()=>btn.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"}),50);}

function refreshConj(wrap){
  // update verb btns
  wrap.querySelectorAll(".conj-vbtn").forEach((b,i)=>b.className="conj-vbtn"+(i===conjVerbIdx?" active":""));
  // update tense tabs
  wrap.querySelectorAll(".conj-ttab").forEach(b=>{
    const tMap={"Présent":"presente","Passé":"passado","Futur":"futuro"};
    b.className="conj-ttab"+(tMap[b.textContent]===conjTense?" active":"");
  });

  const verb=VERBS_CONJ[conjVerbIdx];
  const forms=verb[conjTense];
  const frs=verb[conjTense.replace("presente","pres_fr").replace("passado","pass_fr").replace("futuro","fut_fr")];
  const body=wrap.querySelector("#conj-body");
  body.innerHTML="";

  // tip box
  const tip=document.createElement("div");
  tip.className="conj-tip";
  tip.innerHTML=`<strong>ℹ️ ${verb.inf}</strong> — ${verb.fr}<br><br>${verb.tip}`;
  body.appendChild(tip);

  // conjugation table
  const tenseLabel={"presente":"Présent","passado":"Passé simple / imparfait","futuro":"Futur"};
  const title=document.createElement("div");
  title.style.cssText="font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--dim);margin-bottom:8px";
  title.textContent=tenseLabel[conjTense];
  body.appendChild(title);

  const table=document.createElement("div");
  table.className="conj-table";
  PRONOUNS_PT.forEach((pron,i)=>{
    const row=document.createElement("div");
    row.className="conj-row";
    const formText=`${pron} ${forms[i]}`;
    row.innerHTML=`
      <div class="conj-pron">${pron}</div>
      <div>
        <div class="conj-form">${forms[i]}</div>
        <div class="conj-fr">${PRONOUNS_FR[i]} ${frs[i]}</div>
      </div>
      <button class="conj-play" onclick="event.stopPropagation();speak('${formText.replace(/'/g," ")}')">🔊</button>`;
    table.appendChild(row);
  });
  body.appendChild(table);

  // Examples
  const exBox=document.createElement("div");
  exBox.className="conj-ex-box";
  exBox.innerHTML=`<div class="conj-ex-title">Exemples</div>`;
  verb.examples.filter(e=>e.t===conjTense).forEach(ex=>{
    exBox.innerHTML+=`<div class="conj-ex-sent">${ex.pt}</div><div class="conj-ex-trans">${ex.fr}</div>`;
  });
  body.appendChild(exBox);

  // Irregular note
  const irregulars=["Ser","Estar","Ter","Ir","Fazer","Vir","Dar","Ver","Saber","Poder","Querer"];
  if(irregulars.includes(verb.inf)){
    const note=document.createElement("div");
    note.style.cssText="background:rgba(212,82,42,.07);border:1px solid rgba(212,82,42,.2);border-radius:var(--r);padding:10px 14px;font-size:12px;color:#FF7A5A;margin-bottom:12px";
    note.innerHTML=`⚠️ <strong>${verb.inf}</strong> est un verbe <strong>irrégulier</strong> — à mémoriser par cœur !`;
    body.appendChild(note);
  }
}

        <em>Eu não gosto <strong>não</strong>.</em> — Je n'aime vraiment pas. (insistance)<br>
        <em>Não quero ir lá não.</em> — Je ne veux vraiment pas y aller.<br><br>
        On peut aussi mettre "não" seul en fin de phrase pour renforcer :<br>
        <em>Fui lá <strong>não</strong>.</em> → Je n'y suis pas allé.
      </div>
      <div style="font-size:13px;font-weight:700;margin:14px 0 6px">Autres négatifs :</div>
      <table class="gram-table"><thead><tr><th>Mot</th><th>Traduction</th><th>Exemple</th></tr></thead><tbody>
        <tr><td><strong>nunca</strong></td><td>jamais</td><td><em>Nunca fui ao Japão.</em> — Je ne suis jamais allé au Japon.</td></tr>
        <tr><td><strong>nada</strong></td><td>rien</td><td><em>Não fiz nada.</em> — Je n'ai rien fait.</td></tr>
        <tr><td><strong>ninguém</strong></td><td>personne</td><td><em>Não vi ninguém.</em> — Je n'ai vu personne.</td></tr>
        <tr><td><strong>nem...nem</strong></td><td>ni...ni</td><td><em>Não gosto nem de café nem de chá.</em></td></tr>
        <tr><td><strong>ainda não</strong></td><td>pas encore</td><td><em>Ainda não comi.</em> — Je n'ai pas encore mangé.</td></tr>
      </tbody></table>
      ${gramQuiz("Comment dit-on \"Je n'ai jamais mangé de feijoada\" ?",[{t:"Nunca comi feijoada.",ok:true},{t:"Não comi feijoada nunca.",ok:true},{t:"Não nunca comi feijoada.",ok:false}],"Les deux premières formes sont correctes ! 'Nunca comi' ou 'Não comi nunca' sont les deux acceptées.")}
    `
  },
  {
    label:"Verbe progressif",icon:"🔄",
    content:()=>`
      <div class="gram-sub">Exprimer une action en cours — le présent continu brésilien</div>
      <div class="gram-rule"><strong>Structure :</strong> Estar (conjugué) + verbe à l'infinitif + <strong>-ndo</strong><br>
        C'est l'équivalent du français "être en train de..."</div>
      <table class="gram-table"><thead><tr><th>Infinitif</th><th>Gérondif (-ndo)</th><th>Exemple</th></tr></thead><tbody>
        <tr><td>falar (parler)</td><td>fal<strong>ando</strong></td><td><em>Estou falando.</em> — Je suis en train de parler.</td></tr>
        <tr><td>comer (manger)</td><td>com<strong>endo</strong></td><td><em>Ele está comendo.</em> — Il est en train de manger.</td></tr>
        <tr><td>dormir (dormir)</td><td>dorm<strong>indo</strong></td><td><em>Ela está dormindo.</em> — Elle est en train de dormir.</td></tr>
        <tr><td>fazer (faire)</td><td>faz<strong>endo</strong></td><td><em>Estamos fazendo.</em> — Nous sommes en train de faire.</td></tr>
      </tbody></table>
      <div class="gram-rule">Formation : retirer <strong>-ar → -ando</strong> / <strong>-er, -ir → -endo, -indo</strong><br>
        Exception : verbos como <strong>pôr → pondo</strong>, <strong>vir → vindo</strong></div>
      <div style="font-size:13px;font-weight:700;margin:14px 0 6px">Futur proche — Ir + infinitif :</div>
      <div style="font-size:13px;color:rgba(240,235,224,.8);line-height:1.8;margin-bottom:10px">
        Exactement comme en français ! <strong>Vou + infinitif = Je vais + infinitif</strong><br>
        <em>Vou comer.</em> — Je vais manger.<br>
        <em>Ela vai sair.</em> — Elle va sortir.<br>
        <em>Vamos estudar.</em> — Nous allons étudier.
      </div>
      ${gramQuiz("\"Il est en train de lire\" en portugais :",[{t:"Ele está lendo.",ok:true},{t:"Ele é lendo.",ok:false},{t:"Ele está ler.",ok:false}],"'Estar + gerúndio (-ndo)' = être en train de. 'Está lendo' = il est en train de lire.")}
    `
  },
  {
    label:"Questions",icon:"❓",
    content:()=>`
      <div class="gram-sub">Poser des questions en portugais brésilien — beaucoup plus simple qu'en français</div>
      <div class="gram-rule"><strong>Intonation montante :</strong> La plupart du temps, on transforme une affirmation en question uniquement par l'intonation, sans changer l'ordre des mots !</div>
      <div style="font-size:13px;color:rgba(240,235,224,.8);line-height:1.8;margin-bottom:12px">
        <em>Você fala português.</em> → <em>Você fala português?</em><br>
        <em>Ele está aqui.</em> → <em>Ele está aqui?</em>
      </div>
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">Mots interrogatifs essentiels :</div>
      <table class="gram-table"><thead><tr><th>Portugais</th><th>Français</th><th>Exemple</th></tr></thead><tbody>
        <tr><td><strong>O que? / Que?</strong></td><td>Quoi ? Que ?</td><td><em>O que você quer?</em> — Que veux-tu ?</td></tr>
        <tr><td><strong>Quem?</strong></td><td>Qui ?</td><td><em>Quem é você?</em> — Qui es-tu ?</td></tr>
        <tr><td><strong>Onde?</strong></td><td>Où ?</td><td><em>Onde você mora?</em> — Où habites-tu ?</td></tr>
        <tr><td><strong>Quando?</strong></td><td>Quand ?</td><td><em>Quando você chega?</em> — Quand arrives-tu ?</td></tr>
        <tr><td><strong>Como?</strong></td><td>Comment ?</td><td><em>Como você está?</em> — Comment vas-tu ?</td></tr>
        <tr><td><strong>Por que? / Porque</strong></td><td>Pourquoi / Parce que</td><td><em>Por que você veio?</em> — Pourquoi es-tu venu ?</td></tr>
        <tr><td><strong>Quanto / Quantos</strong></td><td>Combien</td><td><em>Quanto custa?</em> — Combien ça coûte ?</td></tr>
        <tr><td><strong>Qual / Quais</strong></td><td>Quel / Lesquels</td><td><em>Qual é o seu nome?</em> — Quel est ton prénom ?</td></tr>
      </tbody></table>
      <div class="gram-rule"><strong>Attention :</strong> "Por que" (deux mots, avec accent) = Pourquoi (question) | "Porque" (un mot, sans accent) = Parce que (réponse)</div>
    `
  },
];

function gramQuiz(question,options,explication){
  const id="gq"+Math.random().toString(36).slice(2,7);
  const optsHtml=options.map((o,i)=>`<button class="gram-quiz-opt" data-ok="${o.ok}" data-quiz="${id}" onclick="gramCheck(this,'${id}','${explication.replace(/'/g,"\\'")}')"> ${o.t}</button>`).join("");
  return `<div class="gram-quiz"><div class="gram-quiz-q">🧪 Mini-quiz : ${question}</div><div class="gram-quiz-opts">${optsHtml}</div><div class="gram-quiz-fb" id="gq-fb-${id}"></div></div>`;
}

function gramCheck(btn,id,expl){
  const container=btn.closest(".gram-quiz");
  const btns=container.querySelectorAll(".gram-quiz-opt");
  btns.forEach(b=>{
    b.disabled=true;
    if(b.dataset.ok==="true")b.classList.add("correct");
    else if(b===btn)b.classList.add("wrong");
  });
  const fb=document.getElementById("gq-fb-"+id);
  if(fb){
    fb.style.display="block";
    fb.innerHTML=`<span style="color:${btn.dataset.ok==="true"?"var(--gbright)":"#FF7A5A"}">${btn.dataset.ok==="true"?"✓ Correct !":"✗ Pas tout à fait."}</span> ${expl}`;
  }
}

/* ── DICT ── */
let dictHistory=[];

async function dictLookup(query, container){
  if(!query.trim())return;
  container.innerHTML=`<div class="dict-spinner">Recherche en cours…</div>`;
  try{
    // MyMemory free translation API — no key needed
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(query.trim())}&langpair=fr|pt-BR&de=a@b.c`;
    const resp=await fetch(url);
    const data=await resp.json();

    if(!data||data.responseStatus!==200){
      container.innerHTML=`<div class="dict-error">😕 Aucun résultat pour "<strong>${query}</strong>". Essayez un autre mot.</div>`;
      return;
    }

    const translation=data.responseData.translatedText;
    const frWord=query.trim();

    // Build phonetic approximation from PT word
    function makePhonetic(pt){
      return pt
        .replace(/nh/g,"gn").replace(/lh/g,"ly").replace(/ch/g,"ch")
        .replace(/ão/g,"ang").replace(/ã/g,"an").replace(/õ/g,"ong")
        .replace(/ê/g,"ê").replace(/é/g,"é").replace(/â/g,"â")
        .replace(/ç/g,"ss").replace(/rr/g,"h").replace(/^r/i,"h")
        .toUpperCase();
    }

    // Try to get an example from matches
    let examplePt="", exampleFr="";
    const matches=data.matches||[];
    const goodMatch=matches.find(m=>m.segment&&m.segment.length>5&&m.translation&&m.translation.length>5&&m.quality>50);
    if(goodMatch){
      exampleFr=goodMatch.segment;
      examplePt=goodMatch.translation;
    } else {
      // Fallback: build a simple sentence
      examplePt=`Eu uso "${translation}" todos os dias.`;
      exampleFr=`J'utilise "${frWord}" tous les jours.`;
    }

    // Detect rough grammatical tag
    const tags=[];
    const q=frWord.toLowerCase();
    if(/^(être|avoir|aller|faire|pouvoir|vouloir|savoir|partir|venir|prendre|donner|parler|manger|boire|aimer|voir|dire)\b/.test(q)||q.endsWith("er")||q.endsWith("ir")||q.endsWith("re"))tags.push("verbe");
    else if(/^(le |la |les |un |une |des |l')/.test(q))tags.push("nom");
    else if(q.split(" ").length>2)tags.push("expression");

    if(!dictHistory.find(h=>h.fr===frWord)){
      dictHistory.unshift({pt:translation,fr:frWord,phonetic:makePhonetic(translation),example_pt:examplePt,example_fr:exampleFr,tags});
      if(dictHistory.length>20)dictHistory.pop();
    }

    const tagsHtml=tags.map(t=>`<span class="dict-tag">${t}</span>`).join("");
    // Build a pseudo-word object for phonoLine
    const pseudoWord={pt:translation,ph:makePhonetic(translation),fr:frWord};
    const phonoHtml=`<div style="margin:6px 0 2px">${phonoLine(pseudoWord,"14px")}</div>`;
    container.innerHTML=`
      <div class="dict-result">
        <div class="dict-result-header">
          <div class="dict-pt-word">${translation}</div>
          ${phonoHtml}
          <div class="dict-fr-word" style="margin-top:4px">🇫🇷 ${frWord}</div>
        </div>
        <div class="dict-body">
          ${tagsHtml?`<div><div class="dict-section-lbl">Catégorie</div><div class="dict-tags">${tagsHtml}</div></div>`:""}
          <div>
            <div class="dict-section-lbl">Exemple en contexte</div>
            <div class="dict-example">${examplePt}</div>
            <div class="dict-example-trans">${exampleFr}</div>
          </div>
          <div style="margin-top:4px">
            <a href="https://translate.google.com/?sl=fr&tl=pt-BR&text=${encodeURIComponent(frWord)}" target="_blank" style="font-size:11px;color:var(--dim);text-decoration:none">Vérifier sur Google Traduction →</a>
          </div>
        </div>
      </div>`;
  }catch(e){
    container.innerHTML=`<div class="dict-error">❌ Erreur réseau. Vérifiez votre connexion internet.</div>`;
    console.error(e);
  }
}

function renderDict(){
  const wrap=document.createElement("div");
  wrap.className="dict-wrap au";

  wrap.innerHTML=`

      <div style="position:relative">
        <input id="dict-q"
          placeholder="bonjour, je suis fatigué, aimer…"
          autocomplete="off" autocorrect="off" spellcheck="false"
          style="width:100%;background:var(--surf);border:2px solid var(--brd);border-radius:16px;
                 padding:16px 52px 16px 18px;font-size:16px;color:var(--txt);
