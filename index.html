<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FalaBrasil 🇧🇷</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1A14;--bg2:#162010;--surf:rgba(240,235,224,.05);
  --brd:rgba(240,235,224,.09);--brd2:rgba(240,235,224,.18);
  --txt:#F0EBE0;--muted:rgba(240,235,224,.45);--dim:rgba(240,235,224,.22);
  --gold:#E8A838;--red:#D4522A;--green:#2A7D4F;--gbright:#4DB87A;
  --blue:#1A6B9A;--bbright:#5AB2E0;--danger:#FF6B35;
  --r:14px;--rl:20px;
  --fd:'Fraunces',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif;
}
html,body,#app{height:100%}
body{font-family:var(--fb);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
button{font-family:var(--fb);cursor:pointer}
input{font-family:var(--fb)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}

/* ── Layout ── */
#app{max-width:480px;min-height:100dvh;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow-x:hidden}
#app::before{content:'';position:fixed;top:-150px;right:-80px;width:360px;height:360px;background:radial-gradient(circle,rgba(232,168,56,.10) 0%,transparent 70%);pointer-events:none;z-index:0}
#content{flex:1;padding:0 18px 110px;position:relative;z-index:1;overflow-y:auto}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;background:rgba(15,26,20,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:50}
.logo{font-family:var(--fd);font-size:20px;font-weight:900;letter-spacing:-.5px}
.logo span{color:var(--gold)}
.pills{display:flex;gap:8px}
.pill{display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--surf);border:1px solid var(--brd);border-radius:20px;font-size:12px;font-weight:600}
.pill-fire{color:var(--danger)}.pill-xp{color:var(--gold)}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:rgba(15,26,20,.95);backdrop-filter:blur(16px);border-top:1px solid var(--brd);z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px 12px;border:none;background:none;color:var(--muted);font-size:10px;font-weight:500;transition:color .15s;position:relative}
.nav-btn.active{color:var(--gold)}
.nav-btn svg{width:22px;height:22px}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;border-radius:8px;font-size:9px;font-weight:700;padding:1px 5px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--r);font-weight:600;transition:transform .15s,box-shadow .15s,background .15s;cursor:pointer}
.btn-p{background:linear-gradient(135deg,var(--gold) 0%,var(--red) 100%);color:#fff;padding:15px 24px;font-size:15px;box-shadow:0 4px 20px rgba(232,168,56,.28)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(232,168,56,.38)}
.btn-p:active{transform:translateY(0)}
.btn-s{background:var(--surf);border:1px solid var(--brd);color:var(--txt);padding:13px 24px;font-size:14px}
.btn-s:hover{background:rgba(240,235,224,.10)}
.btn-full{width:100%}

/* ── Section label ── */
.lbl{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--dim);margin-bottom:12px;margin-top:26px}

/* ── Stat cards ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.scard{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:14px 10px;text-align:center}
.scard-n{font-family:var(--fd);font-size:28px;font-weight:900;color:var(--gold);line-height:1;margin-bottom:4px}
.scard-l{font-size:10px;color:var(--muted)}

/* ── Progress bar ── */
.pbar{height:4px;background:rgba(240,235,224,.08);border-radius:3px;overflow:hidden}
.pbar-f{height:100%;background:linear-gradient(90deg,var(--gold),var(--red));border-radius:3px;transition:width .5s ease}

/* ── Science box ── */
.sci-box{background:rgba(232,168,56,.05);border:1px solid rgba(232,168,56,.2);border-radius:var(--rl);padding:16px 18px;margin-bottom:10px}
.sci-title{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px}
.sci-item{display:flex;gap:10px;margin-bottom:8px}
.sci-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);margin-top:5px;flex-shrink:0}
.sci-text{font-size:12px;color:rgba(240,235,224,.65);line-height:1.6}
.sci-text strong{color:var(--gold)}

/* ── Home ── */
.hero{text-align:center;padding:24px 0 16px}
.hero-flag{font-size:44px;margin-bottom:14px}
.hero-title{font-family:var(--fd);font-size:28px;font-weight:900;line-height:1.1;margin-bottom:6px}
.hero-title em{color:var(--gold);font-style:italic}
.hero-sub{font-size:12px;color:var(--muted)}
.home-cta{display:flex;flex-direction:column;gap:10px;margin:18px 0}
.cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);padding:16px;cursor:pointer;transition:border-color .2s,transform .2s;position:relative;overflow:hidden}
.cat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--cc,#E8A838) 0%,transparent 60%);opacity:.05;transition:opacity .2s}
.cat-card:hover{border-color:var(--brd2);transform:translateY(-2px)}
.cat-card:hover::before{opacity:.10}
.cat-icon{font-size:26px;margin-bottom:8px}
.cat-name{font-family:var(--fd);font-weight:700;font-size:14px;margin-bottom:2px}
.cat-count{font-size:11px;color:var(--muted);margin-bottom:8px}
.cat-bar{height:3px;background:rgba(240,235,224,.08);border-radius:2px;overflow:hidden}
.cat-bar-f{height:100%;border-radius:2px;transition:width .6s ease}

/* ── Exercise screen ── */
.ex-screen{padding-top:14px}
.ex-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ex-quit{background:none;border:none;color:var(--muted);font-size:13px;padding:4px 0;transition:color .15s}
.ex-quit:hover{color:var(--txt)}
.ex-ctr{font-size:12px;color:var(--muted)}
.type-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surf);border:1px solid var(--brd);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:16px}
.ex-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);padding:28px 22px;margin-bottom:16px;min-height:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
.ex-card::after{content:'';position:absolute;bottom:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(232,168,56,.07) 0%,transparent 70%);pointer-events:none}
.ex-word{font-family:var(--fd);font-size:44px;font-weight:900;line-height:1.05;margin-bottom:10px}
.ex-phon{font-size:13px;color:var(--gold);font-style:italic;letter-spacing:.4px;margin-bottom:6px}
.ex-hint{font-size:12px;color:var(--dim)}
.ex-sent{font-size:14px;color:rgba(240,235,224,.72);line-height:1.65;font-style:italic;margin-top:10px}
.ex-fr{font-family:var(--fd);font-size:28px;font-weight:700;color:var(--gold);margin-bottom:8px}
.ex-trans{font-size:12px;color:var(--muted);font-style:italic;margin-top:6px}

/* ── Flashcard ── */
.fc-wrap{cursor:pointer;perspective:1000px}
.fc-inner{position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{backface-visibility:hidden;-webkit-backface-visibility:hidden}
.fc-back{position:absolute;inset:0;transform:rotateY(180deg);background:rgba(232,168,56,.07);border:1px solid rgba(232,168,56,.22);border-radius:var(--rl)}

/* ── Rating ── */
.rating-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.r-btn{display:flex;flex-direction:column;align-items:center;gap:4px;border:1px solid transparent;border-radius:var(--r);padding:11px 6px;font-size:11px;font-weight:600;transition:transform .12s,filter .12s}
.r-btn:hover{transform:translateY(-1px);filter:brightness(1.2)}
.r-btn span{font-size:18px}
.r-fail{background:rgba(212,82,42,.14);color:#FF7A5A;border-color:rgba(212,82,42,.28)}
.r-hard{background:var(--surf);color:var(--muted);border-color:var(--brd)}
.r-ok{background:rgba(26,107,154,.14);color:var(--bbright);border-color:rgba(26,107,154,.28)}
.r-easy{background:rgba(42,125,79,.14);color:var(--gbright);border-color:rgba(42,125,79,.28)}

/* ── Multiple choice ── */
.mc-opts{display:flex;flex-direction:column;gap:10px}
.mc-opt{background:rgba(240,235,224,.06);border:1.5px solid var(--brd);border-radius:var(--r);padding:14px 18px;font-size:15px;text-align:left;color:var(--txt);transition:background .12s,border-color .12s}
.mc-opt:hover:not(:disabled){background:rgba(240,235,224,.11);border-color:var(--brd2)}
.mc-opt:disabled{cursor:default}
.mc-correct{background:rgba(42,125,79,.18)!important;border-color:var(--green)!important;color:var(--gbright)!important}
.mc-wrong{background:rgba(212,82,42,.18)!important;border-color:var(--red)!important;color:#FF7A5A!important}

/* ── Typing ── */
.t-input{width:100%;background:rgba(240,235,224,.07);border:1.5px solid var(--brd2);border-radius:var(--r);padding:15px 18px;font-size:17px;color:var(--txt);outline:none;transition:border-color .2s;margin-bottom:10px}
.t-input:focus{border-color:rgba(232,168,56,.5)}
.t-correct{border-color:var(--green)!important;background:rgba(42,125,79,.10)!important}
.t-wrong{border-color:var(--red)!important;background:rgba(212,82,42,.10)!important}
.t-fb{font-size:13px;font-weight:600;margin-bottom:10px}
.t-fb-ok{color:var(--gbright)}.t-fb-no{color:#FF7A5A}

/* ── Finish ── */
.finish{text-align:center;padding:40px 0}
.fin-emoji{font-size:64px;margin-bottom:20px}
.fin-title{font-family:var(--fd);font-size:32px;font-weight:900;margin-bottom:8px}
.fin-sub{font-size:14px;color:var(--muted);margin-bottom:32px}
.fin-stats{display:flex;justify-content:center;gap:28px;margin-bottom:32px}
.fin-n{font-family:var(--fd);font-size:38px;font-weight:900;color:var(--gold);display:block;line-height:1}
.fin-l{font-size:12px;color:var(--muted);display:block;margin-top:4px}

/* ── Vocab screen ── */
.vocab-tabs{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none}
.vocab-tabs::-webkit-scrollbar{display:none}
.v-tab{white-space:nowrap;border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;flex-shrink:0;transition:background .15s,color .15s;cursor:pointer}
.v-search{width:100%;background:var(--surf);border:1.5px solid var(--brd);border-radius:var(--r);padding:11px 16px;font-size:14px;color:var(--txt);outline:none;margin-bottom:14px;transition:border-color .2s}
.v-search:focus{border-color:rgba(232,168,56,.4)}
.v-search::placeholder{color:var(--dim)}
.wcard{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.wcard:hover{border-color:var(--brd2)}
.wcard.open{border-color:rgba(232,168,56,.3);background:rgba(232,168,56,.04)}
.wcard-row{display:flex;align-items:center;justify-content:space-between}
.wcard-pt{font-family:var(--fd);font-size:19px;font-weight:700}
.wcard-fr{font-size:13px;color:var(--muted);margin-top:1px}
.wcard-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.wcard-dot{width:8px;height:8px;border-radius:50%}
.wcard-expand{margin-top:12px;padding-top:12px;border-top:1px solid var(--brd)}
.exp-lbl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.exp-val{font-size:13px;color:rgba(240,235,224,.72);line-height:1.6}
.exp-phon{font-size:13px;color:var(--gold);font-style:italic}
.exp-trans{font-size:12px;color:var(--muted);font-style:italic;margin-top:3px}

/* ── Stats screen ── */
.cat-prog{margin-bottom:14px}
.cat-prog-top{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
.cat-prog-bar{height:6px;background:rgba(240,235,224,.08);border-radius:3px;overflow:hidden}
.cat-prog-f{height:100%;border-radius:3px;transition:width .6s ease}

/* ── XP popup ── */
.xp-pop{position:fixed;top:76px;right:20px;background:linear-gradient(135deg,var(--gold),var(--red));color:#fff;border-radius:20px;padding:7px 14px;font-weight:700;font-size:13px;z-index:200;pointer-events:none;animation:xpf 1.6s ease forwards}
@keyframes xpf{0%{opacity:0;transform:translateY(8px) scale(.8)}20%{opacity:1;transform:translateY(0) scale(1)}80%{opacity:1}100%{opacity:0;transform:translateY(-24px)}}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.au{animation:fadeUp .35s ease}

/* ── Dictionary screen ── */
.dict-wrap{padding-top:16px}
.dict-input-row{display:flex;gap:8px;margin-bottom:20px}
.dict-input{flex:1;background:var(--surf);border:1.5px solid var(--brd);border-radius:var(--r);padding:13px 16px;font-size:15px;color:var(--txt);outline:none;transition:border-color .2s}
.dict-input:focus{border-color:rgba(232,168,56,.5)}
.dict-input::placeholder{color:var(--dim)}
.dict-btn{background:linear-gradient(135deg,var(--gold),var(--red));border:none;border-radius:var(--r);padding:13px 18px;color:#fff;font-size:20px;cursor:pointer;transition:transform .15s;flex-shrink:0}
.dict-btn:hover{transform:translateY(-1px)}
.dict-btn:disabled{opacity:.5;cursor:default;transform:none}
.dict-result{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;animation:fadeUp .35s ease}
.dict-result-header{background:rgba(232,168,56,.07);border-bottom:1px solid var(--brd);padding:20px 20px 16px}
.dict-pt-word{font-family:var(--fd);font-size:38px;font-weight:900;line-height:1;margin-bottom:6px}
.dict-phonetic{font-size:13px;color:var(--gold);font-style:italic;margin-bottom:4px}
.dict-fr-word{font-size:14px;color:var(--muted)}
.dict-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.dict-section-lbl{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--dim);margin-bottom:5px;font-weight:700}
.dict-example{font-size:15px;color:var(--txt);line-height:1.65;font-style:italic}
.dict-example-trans{font-size:13px;color:var(--muted);margin-top:4px;font-style:italic}
.dict-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.dict-tag{background:rgba(232,168,56,.1);border:1px solid rgba(232,168,56,.2);color:var(--gold);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:600}
.dict-history{margin-top:20px}
.dict-hist-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.dict-hist-item:hover{border-color:var(--brd2)}
.dict-hist-pt{font-family:var(--fd);font-size:16px;font-weight:700}
.dict-hist-fr{font-size:12px;color:var(--muted)}
.dict-spinner{display:flex;align-items:center;justify-content:center;gap:10px;padding:32px;color:var(--muted);font-size:14px}
.dict-spinner::before{content:'';width:20px;height:20px;border:2px solid var(--brd2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.dict-empty{text-align:center;padding:48px 24px;color:var(--muted)}
.dict-empty-icon{font-size:48px;margin-bottom:16px}
.dict-empty-title{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--txt);margin-bottom:8px}
.dict-empty-sub{font-size:13px;line-height:1.6}
.dict-error{background:rgba(212,82,42,.08);border:1px solid rgba(212,82,42,.25);border-radius:var(--r);padding:14px 16px;color:#FF7A5A;font-size:13px;text-align:center}

/* ── Responsive tweak ── */
@media(max-width:380px){.ex-word{font-size:36px}.rating-row{gap:5px}.r-btn{padding:9px 4px;font-size:10px}}

</style>
</head>
<body>
<div id="app">
  <header class="hdr" id="hdr">
    <div class="logo">Fala<span>Brasil</span></div>
    <div class="pills">
      <div class="pill pill-fire" id="pill-streak">🔥 0</div>
      <div class="pill pill-xp" id="pill-xp">⚡ 0 XP</div>
    </div>
  </header>
  <main id="content"></main>
  <nav class="nav" id="nav">
    <button class="nav-btn active" onclick="goTo('home')" id="nb-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      Accueil<span class="nav-badge" id="due-badge" style="display:none"></span>
    </button>
    <button class="nav-btn" onclick="goTo('vocab')" id="nb-vocab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Vocab
    </button>
    <button class="nav-btn" onclick="goTo('dict')" id="nb-dict">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Dico
    </button>
    <button class="nav-btn" onclick="goTo('stats')" id="nb-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Stats
    </button>
  </nav>
</div>

<script>
/* ════════════════════════════════════════════════════════
   VOCABULAIRE — ~600 mots · 22 catégories
════════════════════════════════════════════════════════ */
const VOCAB = {
  greetings:{label:"Saudações",icon:"👋",color:"#E8A838",words:[
    {id:"gr01",pt:"Olá",fr:"Bonjour / Salut",ph:"o-LAH",s:"Olá! Como vai você?",t:"Salut ! Comment ça va ?"},
    {id:"gr02",pt:"Oi",fr:"Salut (informel)",ph:"OY",s:"Oi, tudo bem?",t:"Salut, tout va bien ?"},
    {id:"gr03",pt:"Bom dia",fr:"Bonjour (matin)",ph:"bong JI-a",s:"Bom dia! Você dormiu bem?",t:"Bonjour ! Vous avez bien dormi ?"},
    {id:"gr04",pt:"Boa tarde",fr:"Bon après-midi",ph:"boa TAR-dji",s:"Boa tarde! Como foi seu dia?",t:"Bon après-midi ! Comment s'est passée ta journée ?"},
    {id:"gr05",pt:"Boa noite",fr:"Bonsoir / Bonne nuit",ph:"boa NOY-tchi",s:"Boa noite, durma bem!",t:"Bonsoir, dormez bien !"},
    {id:"gr06",pt:"Tchau",fr:"Au revoir / Ciao",ph:"CHOW",s:"Tchau! Até mais!",t:"Au revoir ! À plus !"},
    {id:"gr07",pt:"Até logo",fr:"À tout à l'heure",ph:"a-TE LO-go",s:"Até logo, nos vemos amanhã.",t:"À tout à l'heure, on se voit demain."},

const ALL_WORDS = Object.values(VOCAB).flatMap(c=>c.words);
const TOTAL = ALL_WORDS.length;

/* ════════════════════════════════════════
   SRS — Algorithme SM-2
════════════════════════════════════════ */
function sm2(card={},q){
  let{ease=2.5,interval=1,reps=0}=card;
  if(q<1){reps=0;interval=1;}
  else{
    if(reps===0)interval=1;
    else if(reps===1)interval=6;
    else interval=Math.round(interval*ease);
    reps++;
  }
  ease=Math.max(1.3,ease+0.1-(3-q)*(0.08+(3-q)*0.02));
  return{ease,interval,reps,nextReview:Date.now()+interval*86400000,lastQ:q};
}
function getDue(){
  const now=Date.now();
  return ALL_WORDS.filter(w=>{const c=cards[w.id];return!c||c.nextReview<=now});
}
function masteryLevel(c){
  if(!c||c.reps===0)return 0;
  const i=c.interval;
  if(i>=30)return 5;if(i>=15)return 4;if(i>=7)return 3;if(i>=3)return 2;return 1;
}

const MCol=["#555","#E74C3C","#E67E22","#F1C40F","#2ECC71","#3498DB"];

let cards={},meta={xp:0,streak:0,lastDate:null,sessionsTotal:0,wordsReviewed:0,correctAnswers:0};
let screen="home",queue=[],qIdx=0,exercise=null,sesStats={c:0,t:0},sesDone=false;
let vocabCat=Object.keys(VOCAB)[0],vocabSearch="",expandedWord=null;

function save(){
  try{localStorage.setItem("fb_cards",JSON.stringify(cards));localStorage.setItem("fb_meta",JSON.stringify(meta));}catch{}
}
function load(){
  try{const c=localStorage.getItem("fb_cards");if(c)cards=JSON.parse(c);}catch{}
  try{const m=localStorage.getItem("fb_meta");if(m)meta={...meta,...JSON.parse(m)};}catch{}
}
load();

function todayStr(){return new Date().toISOString().split("T")[0];}
function updateStreak(){
  const today=todayStr();
  if(meta.lastDate===today)return;
  const yest=new Date(Date.now()-86400000).toISOString().split("T")[0];
  meta.streak=meta.lastDate===yest?(meta.streak||0)+1:1;
  meta.lastDate=today;
  meta.sessionsTotal=(meta.sessionsTotal||0)+1;
}

/* ════════════════════════════════════════
   SESSIONS
════════════════════════════════════════ */
function startSession(catKey){
  const due=getDue();
  let pool;
  if(catKey){
    const catDue=due.filter(w=>VOCAB[catKey].words.some(cw=>cw.id===w.id));
    pool=catDue.length>0?catDue:[...VOCAB[catKey].words].sort(()=>Math.random()-.5);
  } else {
    pool=due.length>0?due:[...ALL_WORDS].sort(()=>Math.random()-.5);
  }
  queue=pool.slice(0,10);
  qIdx=0;sesDone=false;sesStats={c:0,t:0};
  exercise=mkExercise(queue[0]);
  screen="session";render();
}

function mkExercise(word){
  const types=["flashcard","mc","typing","context"];
  const type=types[Math.floor(Math.random()*types.length)];
  if(type==="mc"){
    // Affiche le mot PT → trouver la bonne traduction FR
    const distractors=ALL_WORDS.filter(w=>w.id!==word.id).sort(()=>Math.random()-.5).slice(0,3).map(w=>w.fr);
    return{type,word,options:[word.fr,...distractors].sort(()=>Math.random()-.5)};
  }
  if(type==="context"){
    // Compléter la phrase PT → options en PT
    const distractors=ALL_WORDS.filter(w=>w.id!==word.id).sort(()=>Math.random()-.5).slice(0,3).map(w=>w.pt);
    return{type,word,options:[word.pt,...distractors].sort(()=>Math.random()-.5)};
  }
  return{type,word};
}

function rate(q){
  const word=queue[qIdx];
  const upd=sm2(cards[word.id],q);
  cards[word.id]=upd;
  const xpGain=[0,5,10,15][q]||0;
  const ok=q>=1;
  updateStreak();
  meta.xp=(meta.xp||0)+xpGain;
  meta.wordsReviewed=(meta.wordsReviewed||0)+1;
  meta.correctAnswers=(meta.correctAnswers||0)+(ok?1:0);
  sesStats={c:sesStats.c+(ok?1:0),t:sesStats.t+1};
  save();
  if(xpGain>0)showXP(xpGain);
  const next=qIdx+1;
  if(next>=queue.length){sesDone=true;render();}
  else{qIdx=next;exercise=mkExercise(queue[qIdx]);render();}
}

function showXP(n){
  const el=document.createElement("div");
  el.className="xp-pop";el.textContent=`+${n} XP ⚡`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1700);
}

function renderMC(){
  const {word,options}=exercise;
  const wrap=div("au");
  wrap.innerHTML=`
    <div class="type-badge">❓ Choix multiple</div>
    <div class="ex-card">
      <div class="ex-word">${word.pt}</div>

    </div>
    <div class="mc-opts"></div>`;
  const optsDiv=wrap.querySelector(".mc-opts");
  options.forEach(opt=>{
    const btn=document.createElement("button");
    btn.className="mc-opt";btn.textContent=opt;
    btn.addEventListener("click",()=>{
      if(btn.disabled)return;
      optsDiv.querySelectorAll(".mc-opt").forEach(b=>{
        b.disabled=true;
        if(b.textContent===word.fr)b.classList.add("mc-correct");
        else if(b===btn&&opt!==word.fr)b.classList.add("mc-wrong");
      });
      setTimeout(()=>rate(opt===word.fr?2:0),1300);
    });
    optsDiv.appendChild(btn);
  });
  return wrap;
}

function renderTyping(){
  const {word}=exercise;
  const wrap=div("au");
  wrap.innerHTML=`
    <div class="type-badge">✏️ Production active</div>
    <div class="ex-card" style="min-height:140px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Traduisez en français :</div>
      <div style="font-family:var(--fd);font-size:20px;line-height:1.6">${word.s}</div>
      <div style="font-size:12px;color:var(--dim);margin-top:8px">Mot clé : <span style="color:var(--gold);font-weight:600">${word.pt}</span></div>
    </div>`;
  const inp=document.createElement("input");
  inp.className="t-input";inp.placeholder=`Traduction de « ${word.pt} »…`;
  const fb=div("t-fb","");fb.style.display="none";
  const checkBtn=document.createElement("button");
  checkBtn.className="btn btn-p btn-full";checkBtn.textContent="Vérifier →";checkBtn.style.display="none";
  function norm(s){return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g,"");}
  function check(){
    if(inp.disabled)return;
    const ok=norm(inp.value)===norm(word.fr)||norm(inp.value)===norm(word.pt);
    inp.disabled=true;checkBtn.style.display="none";
    inp.classList.add(ok?"t-correct":"t-wrong");
    fb.style.display="block";
    fb.className="t-fb "+(ok?"t-fb-ok":"t-fb-no");
    fb.innerHTML=ok?"✓ Parfait !":`✗ Réponse : <strong>${word.fr}</strong>`;
    setTimeout(()=>rate(ok?2:0),1300);
  }
  inp.addEventListener("input",()=>{checkBtn.style.display=inp.value.trim()?"block":"none";});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")check();});
  checkBtn.addEventListener("click",check);
  wrap.appendChild(inp);wrap.appendChild(fb);wrap.appendChild(checkBtn);
  setTimeout(()=>inp.focus(),100);
  return wrap;
}

function renderContext(){
  const {word,options}=exercise;
  const ptWords=word.pt.split("/")[0].trim();
  const escaped=ptWords.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  const blank=word.s.replace(new RegExp(escaped,"gi"),"___");
  const wrap=div("au");
  wrap.innerHTML=`
    <div class="type-badge">📖 Apprentissage contextuel</div>
    <div class="ex-card" style="min-height:150px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Quel mot complète cette phrase en portugais ?</div>
      <div style="font-family:var(--fd);font-size:20px;line-height:1.65">${blank}</div>
      <div style="font-size:13px;color:var(--muted);font-style:italic;margin-top:8px">${word.t}</div>
    </div>
    <div class="mc-opts"></div>`;
  const optsDiv=wrap.querySelector(".mc-opts");
  options.forEach(opt=>{
    const btn=document.createElement("button");
    btn.className="mc-opt";btn.textContent=opt;
    btn.addEventListener("click",()=>{
      if(btn.disabled)return;
      const correct=word.pt;
      optsDiv.querySelectorAll(".mc-opt").forEach(b=>{
        b.disabled=true;
        if(b.textContent===correct)b.classList.add("mc-correct");
        else if(b===btn&&opt!==correct)b.classList.add("mc-wrong");
      });
      setTimeout(()=>rate(opt===correct?2:0),1300);
    });
    optsDiv.appendChild(btn);
  });
  return wrap;
}

/* ── VOCAB ── */
function renderVocab(){
  const wrap=div("au");
  wrap.style.paddingTop="16px";
  wrap.innerHTML=`<h2 style="font-family:var(--fd);font-size:24px;font-weight:900;margin-bottom:14px">Vocabulaire</h2>
    <input class="v-search" id="vsearch" placeholder="🔍 Rechercher un mot…" value="${vocabSearch}"/>
    <div class="vocab-tabs" id="vtabs"></div>
    <div id="vwords"></div>`;

  const search=wrap.querySelector("#vsearch");
  search.addEventListener("input",e=>{vocabSearch=e.target.value;expandedWord=null;refreshVocab(wrap);});

  const tabs=wrap.querySelector("#vtabs");
  Object.entries(VOCAB).forEach(([key,cat])=>{
    const btn=document.createElement("button");
    btn.className="v-tab";
    btn.textContent=`${cat.icon} ${cat.label}`;
    btn.style.background=vocabCat===key&&!vocabSearch?cat.color:"rgba(240,235,224,.07)";
    btn.style.color=vocabCat===key&&!vocabSearch?"#0F1A14":"rgba(240,235,224,.6)";
    btn.addEventListener("click",()=>{vocabCat=key;vocabSearch="";expandedWord=null;search.value="";renderVocab_refresh(wrap);renderVocab_tabs(wrap);});
    tabs.appendChild(btn);
  });
  refreshVocab(wrap);
  return wrap;
}
function renderVocab_tabs(wrap){
  const tabs=wrap.querySelector("#vtabs");
  tabs.querySelectorAll(".v-tab").forEach((btn,i)=>{
    const key=Object.keys(VOCAB)[i];
    const cat=VOCAB[key];
    btn.style.background=vocabCat===key&&!vocabSearch?cat.color:"rgba(240,235,224,.07)";
    btn.style.color=vocabCat===key&&!vocabSearch?"#0F1A14":"rgba(240,235,224,.6)";
  });
}
function refreshVocab(wrap){
  const searching=vocabSearch.trim().length>0;
  const words=searching
    ?ALL_WORDS.filter(w=>w.pt.toLowerCase().includes(vocabSearch.toLowerCase())||w.fr.toLowerCase().includes(vocabSearch.toLowerCase()))
    :VOCAB[vocabCat].words;
  const container=wrap.querySelector("#vwords");
  container.innerHTML="";
  if(searching)container.insertAdjacentHTML("beforeend",`<p style="font-size:12px;color:var(--muted);margin-bottom:12px">${words.length} résultat${words.length!==1?"s":""}</p>`);
  words.forEach(word=>{
    const card=document.createElement("div");
    const card_data=cards[word.id];
    const lvl=masteryLevel(card_data);
    card.className="wcard"+(expandedWord===word.id?" open":"");
    card.innerHTML=`
      <div class="wcard-row">
        <div><div class="wcard-pt">${word.pt}</div><div class="wcard-fr">${word.fr}</div></div>
        <div class="wcard-meta">
          <span style="font-size:10px;font-weight:600;color:${MCol[lvl]}">${lvl>0?MLab[lvl]:""}</span>
          <div class="wcard-dot" style="background:${lvl>0?MCol[lvl]:"rgba(240,235,224,.18)"}"></div>
        </div>
      </div>
      ${expandedWord===word.id?`
      <div class="wcard-expand au">
        <div style="margin-bottom:8px"><div class="exp-lbl">Prononciation</div><div class="exp-phon">/${word.ph}/</div></div>
        <div><div class="exp-lbl">Exemple</div><div class="exp-val">${word.s}</div><div class="exp-trans">${word.t}</div></div>
        ${card_data&&card_data.reps>0?`<div style="margin-top:8px"><div class="exp-lbl">SRS</div><div style="font-size:12px;color:var(--muted)">Intervalle: ${card_data.interval}j · Rép: ${card_data.reps} · Ease: ${card_data.ease?.toFixed(2)}</div></div>`:""}
      </div>`:""}`;
    card.addEventListener("click",()=>{expandedWord=expandedWord===word.id?null:word.id;refreshVocab(wrap);});
    container.appendChild(card);
  });
}
function renderVocab_refresh(wrap){refreshVocab(wrap);}

/* ── STATS ── */
function renderStats(){
  const learned=Object.values(cards).filter(c=>c.reps>0).length;
  const due=getDue().length;
  const acc=meta.wordsReviewed>0?Math.round(meta.correctAnswers/meta.wordsReviewed*100):0;
  const dist=[0,0,0,0,0,0];
  ALL_WORDS.forEach(w=>dist[masteryLevel(cards[w.id])]++);

  const wrap=div("au");
  wrap.style.paddingTop="16px";
  wrap.innerHTML=`
    <h2 style="font-family:var(--fd);font-size:24px;font-weight:900;margin-bottom:20px">Statistiques</h2>
    <div class="stats-row">
      <div class="scard"><div class="scard-n">${meta.xp||0}</div><div class="scard-l">Total XP</div></div>
      <div class="scard"><div class="scard-n">${meta.streak||0}</div><div class="scard-l">Série jours</div></div>
      <div class="scard"><div class="scard-n">${meta.sessionsTotal||0}</div><div class="scard-l">Sessions</div></div>
    </div>
    <div class="stats-row" style="margin-top:8px;margin-bottom:24px">
      <div class="scard"><div class="scard-n">${learned}</div><div class="scard-l">Appris</div></div>
      <div class="scard"><div class="scard-n">${acc}%</div><div class="scard-l">Précision</div></div>
      <div class="scard"><div class="scard-n">${due}</div><div class="scard-l">À réviser</div></div>
    </div>
    <p class="lbl">Niveaux de maîtrise</p>
    ${MLab.map((lbl,i)=>`
      <div class="cat-prog">
        <div class="cat-prog-top">
          <span style="font-weight:600;color:${MCol[i]}">${lbl}</span>
          <span style="font-size:12px;color:var(--muted)">${dist[i]} / ${TOTAL}</span>
        </div>
        <div class="cat-prog-bar"><div class="cat-prog-f" style="width:${dist[i]/TOTAL*100}%;background:${MCol[i]}"></div></div>
      </div>`).join("")}
    <p class="lbl">Progression par thème</p>
    ${Object.entries(VOCAB).map(([key,cat])=>{
      const lrn=cat.words.filter(w=>cards[w.id]?.reps>0).length;
      const pct=lrn/cat.words.length*100;
      return `<div class="cat-prog">
        <div class="cat-prog-top"><span style="font-weight:600">${cat.icon} ${cat.label}</span><span style="font-size:12px;color:var(--muted)">${lrn}/${cat.words.length}</span></div>
        <div class="cat-prog-bar"><div class="cat-prog-f" style="width:${pct}%;background:${cat.color}"></div></div>
      </div>`;
    }).join("")}
    <p class="lbl" style="margin-top:28px">Guide SRS</p>
    <div class="sci-box" style="margin-bottom:16px">
      <div class="sci-title">📈 Comment fonctionne l'algorithme</div>
      ${[
        ["Facile (+15 XP)","L'intervalle est multiplié par le facteur de facilité. Exemple : J1 → J6 → J15 → J38…"],
        ["Raté (0 XP)","Le mot revient dès le lendemain — la courbe d'Ebbinghaus en action."],
        ["Ease factor","Commence à 2.5, monte si vous répondez «Facile», descend si vous ratez."],
      ].map(([t,d])=>`<div class="sci-item"><div class="sci-dot"></div><div class="sci-text"><strong>${t}</strong> — ${d}</div></div>`).join("")}
    </div>
    <button class="btn btn-s btn-full" id="reset-btn" style="color:#FF7A5A;border-color:rgba(212,82,42,.3);margin-bottom:20px">🗑 Remettre la progression à zéro</button>`;
  wrap.querySelector("#reset-btn").addEventListener("click",()=>{
    if(confirm("Remettre toute la progression à zéro ?")){
      localStorage.removeItem("fb_cards");localStorage.removeItem("fb_meta");
      cards={};meta={xp:0,streak:0,lastDate:null,sessionsTotal:0,wordsReviewed:0,correctAnswers:0};
      render();
    }
  });
  return wrap;
}

/* ── DICT ── */
let dictHistory=[];

async function dictLookup(query, container){
  if(!query.trim())return;
  container.innerHTML=`<div class="dict-spinner">Recherche en cours…</div>`;
  try{
    // MyMemory free translation API — no key needed
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(query.trim())}&langpair=fr|pt-BR&de=a@b.c`;
    const resp=await fetch(url);
    const data=await resp.json();

    if(!data||data.responseStatus!==200){
      container.innerHTML=`<div class="dict-error">😕 Aucun résultat pour "<strong>${query}</strong>". Essayez un autre mot.</div>`;
      return;
    }

    const translation=data.responseData.translatedText;
    const frWord=query.trim();

    // Build phonetic approximation from PT word
    function makePhonetic(pt){
      return pt
        .replace(/nh/g,"gn").replace(/lh/g,"ly").replace(/ch/g,"ch")
        .replace(/ão/g,"ang").replace(/ã/g,"an").replace(/õ/g,"ong")
        .replace(/ê/g,"ê").replace(/é/g,"é").replace(/â/g,"â")
        .replace(/ç/g,"ss").replace(/rr/g,"h").replace(/^r/i,"h")
        .toUpperCase();
    }

    // Try to get an example from matches
    let examplePt="", exampleFr="";
    const matches=data.matches||[];
    const goodMatch=matches.find(m=>m.segment&&m.segment.length>5&&m.translation&&m.translation.length>5&&m.quality>50);
    if(goodMatch){
      exampleFr=goodMatch.segment;
      examplePt=goodMatch.translation;
    } else {
      // Fallback: build a simple sentence
      examplePt=`Eu uso "${translation}" todos os dias.`;
      exampleFr=`J'utilise "${frWord}" tous les jours.`;
    }

    // Detect rough grammatical tag
    const tags=[];
    const q=frWord.toLowerCase();
    if(/^(être|avoir|aller|faire|pouvoir|vouloir|savoir|partir|venir|prendre|donner|parler|manger|boire|aimer|voir|dire)\b/.test(q)||q.endsWith("er")||q.endsWith("ir")||q.endsWith("re"))tags.push("verbe");
    else if(/^(le |la |les |un |une |des |l')/.test(q))tags.push("nom");
    else if(q.split(" ").length>2)tags.push("expression");

    if(!dictHistory.find(h=>h.fr===frWord)){
      dictHistory.unshift({pt:translation,fr:frWord,phonetic:makePhonetic(translation),example_pt:examplePt,example_fr:exampleFr,tags});
      if(dictHistory.length>20)dictHistory.pop();
    }

    const tagsHtml=tags.map(t=>`<span class="dict-tag">${t}</span>`).join("");
    container.innerHTML=`
      <div class="dict-result">
        <div class="dict-result-header">
          <div class="dict-pt-word">${translation}</div>
          <div class="dict-phonetic">/${makePhonetic(translation)}/</div>
          <div class="dict-fr-word">🇫🇷 ${frWord}</div>
        </div>
        <div class="dict-body">
          ${tagsHtml?`<div><div class="dict-section-lbl">Catégorie</div><div class="dict-tags">${tagsHtml}</div></div>`:""}
          <div>
            <div class="dict-section-lbl">Exemple en contexte</div>
            <div class="dict-example">${examplePt}</div>
            <div class="dict-example-trans">${exampleFr}</div>
          </div>
          <div style="margin-top:4px">
            <a href="https://translate.google.com/?sl=fr&tl=pt-BR&text=${encodeURIComponent(frWord)}" target="_blank" style="font-size:11px;color:var(--dim);text-decoration:none">Vérifier sur Google Traduction →</a>
          </div>
        </div>
      </div>`;
  }catch(e){
    container.innerHTML=`<div class="dict-error">❌ Erreur réseau. Vérifiez votre connexion internet.</div>`;
    console.error(e);
  }
}

function renderDict(){
  const wrap=document.createElement("div");
  wrap.className="dict-wrap au";

  wrap.innerHTML=`
    <h2 style="font-family:var(--fd);font-size:24px;font-weight:900;margin-bottom:6px">📖 Dictionnaire</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:18px">Français → Portugais Brésilien · Gratuit</p>
    <div class="dict-input-row">
      <input class="dict-input" id="dict-q" placeholder="Ex: bonjour, je suis fatigué, aimer…" autocomplete="off" autocorrect="off"/>
      <button class="dict-btn" id="dict-search-btn" title="Chercher">🔍</button>
    </div>
    <div id="dict-result-area"></div>
    <div id="dict-history-area"></div>`;

  const input=wrap.querySelector("#dict-q");
  const btn=wrap.querySelector("#dict-search-btn");
  const resultArea=wrap.querySelector("#dict-result-area");
  const histArea=wrap.querySelector("#dict-history-area");

  function renderHistory(){
    if(dictHistory.length===0){
      histArea.innerHTML=`
        <div class="dict-empty">
          <div class="dict-empty-icon">🇧🇷</div>
          <div class="dict-empty-title">Cherchez un mot</div>
          <div class="dict-empty-sub">Tapez n'importe quel mot ou expression en français pour obtenir sa traduction en portugais brésilien avec un exemple d'utilisation.</div>
        </div>`;
      return;
    }
    histArea.innerHTML=`<p class="lbl" style="margin-top:24px">Recherches récentes</p>`;
    dictHistory.forEach(item=>{
      const el=document.createElement("div");
      el.className="dict-hist-item";
      el.innerHTML=`<div><div class="dict-hist-pt">${item.pt}</div><div class="dict-hist-fr">${item.fr}</div></div><span style="color:var(--dim);font-size:12px">→</span>`;
      el.addEventListener("click",()=>{
        input.value=item.fr;
        // show stored result directly
        const tagsHtml=(item.tags||[]).map(t=>`<span class="dict-tag">${t}</span>`).join("");
        resultArea.innerHTML=`
          <div class="dict-result">
            <div class="dict-result-header">
              <div class="dict-pt-word">${item.pt}</div>
              <div class="dict-phonetic">/${item.phonetic}/</div>
              <div class="dict-fr-word">🇫🇷 ${item.fr}</div>
            </div>
            <div class="dict-body">
              ${tagsHtml?`<div><div class="dict-section-lbl">Catégorie</div><div class="dict-tags">${tagsHtml}</div></div>`:""}
              <div>
                <div class="dict-section-lbl">Exemple en contexte</div>
                <div class="dict-example">${item.example_pt}</div>
                <div class="dict-example-trans">${item.example_fr}</div>
              </div>
            </div>
          </div>`;
        wrap.scrollTop=0;
        resultArea.scrollIntoView({behavior:"smooth",block:"start"});
      });
      histArea.appendChild(el);
    });
  }

  async function doSearch(){
    const q=input.value.trim();
    if(!q)return;
    btn.disabled=true;
    await dictLookup(q,resultArea);
    btn.disabled=false;
    renderHistory();
    resultArea.scrollIntoView({behavior:"smooth",block:"start"});
  }

  btn.addEventListener("click",doSearch);
  input.addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});

  renderHistory();
  return wrap;
}

/* ── INIT ── */
render();
</script>
